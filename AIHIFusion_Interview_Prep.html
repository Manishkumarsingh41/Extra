<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>interview_prep.run — AIHIFusion ASE Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13161c;
  --bg-elevated:#1a1e26;
  --bg-card:#1d212a;
  --bg-sidebar:#0e1014;
  --border:#2a2f3a;
  --border-soft:#22262f;
  --text-primary:#e9e7e2;
  --text-secondary:#8d9099;
  --text-dim:#5d616b;
  --accent:#e8a23d;
  --accent-soft:rgba(232,162,61,0.13);
  --accent-dim:rgba(232,162,61,0.35);
  --pass:#6fae8f;
  --pass-soft:rgba(111,174,143,0.14);
  --hi-tag:#d97757;
  --hi-tag-soft:rgba(217,119,87,0.14);
  --en-tag:#5b8dbf;
  --en-tag-soft:rgba(91,141,191,0.14);
  --radius:10px;
  --mono:'IBM Plex Mono', monospace;
  --sans:'Inter', sans-serif;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent-dim);}
a{color:var(--accent);text-decoration:none;}
code{
  font-family:var(--mono);
  background:var(--bg-elevated);
  border:1px solid var(--border-soft);
  padding:1px 6px;
  border-radius:4px;
  font-size:0.88em;
  color:#e3c98a;
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh;}

/* ---------- Sidebar (file tree) ---------- */
.sidebar{
  width:280px;
  flex-shrink:0;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  padding:18px 0 24px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.sidebar-head{
  padding:0 18px 16px;
  border-bottom:1px solid var(--border-soft);
  margin-bottom:10px;
}
.sidebar-brand{
  font-family:var(--mono);
  font-size:12px;
  color:var(--text-dim);
  letter-spacing:0.02em;
}
.sidebar-brand .dot{color:var(--accent);}
.sidebar-title{
  font-family:var(--display);
  font-weight:600;
  font-size:16px;
  margin-top:6px;
  color:var(--text-primary);
}
.sidebar-sub{
  font-size:12px;
  color:var(--text-secondary);
  margin-top:3px;
}
.tree{padding:6px 10px;}
.tree-item{
  display:flex;
  align-items:baseline;
  gap:8px;
  padding:7px 8px;
  border-radius:6px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:12.5px;
  color:var(--text-secondary);
  white-space:nowrap;
  transition:background .12s, color .12s;
}
.tree-item:hover{background:var(--bg-elevated);color:var(--text-primary);}
.tree-item.active{background:var(--accent-soft);color:var(--accent);}
.tree-item .idx{color:var(--text-dim);flex-shrink:0;}
.tree-item.active .idx{color:var(--accent);}
.tree-item .name{
  overflow:hidden;text-overflow:ellipsis;
  font-family:var(--sans);
  font-size:13px;
}
.tree-item .count{
  margin-left:auto;
  font-size:10.5px;
  color:var(--text-dim);
  background:var(--bg-elevated);
  border-radius:8px;
  padding:1px 7px;
  flex-shrink:0;
}
.tree-item.active .count{color:var(--accent);background:var(--accent-soft);}
.tree-item.done .count{color:var(--pass);}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column;}

.topbar{
  position:sticky;top:0;z-index:5;
  background:rgba(19,22,28,0.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:12px 28px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.breadcrumb{
  font-family:var(--mono);
  font-size:12.5px;
  color:var(--text-dim);
  display:flex;align-items:center;gap:6px;
}
.breadcrumb .cursor{
  color:var(--accent);
  animation:blink 1.1s steps(2) infinite;
}
@keyframes blink{50%{opacity:0;}}
.search-wrap{
  flex:1;
  max-width:340px;
  position:relative;
}
.search-wrap input{
  width:100%;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 12px 8px 30px;
  color:var(--text-primary);
  font-family:var(--mono);
  font-size:12.5px;
}
.search-wrap input::placeholder{color:var(--text-dim);}
.search-wrap .icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text-dim);font-size:12px;
}
.lang-toggle{
  display:flex;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:8px;
  padding:2px;
  font-family:var(--mono);
  font-size:11.5px;
}
.lang-toggle button{
  background:none;border:none;color:var(--text-secondary);
  padding:6px 10px;border-radius:6px;cursor:pointer;
}
.lang-toggle button.active{background:var(--accent-soft);color:var(--accent);}

.progress-pill{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--text-secondary);
  display:flex;align-items:center;gap:8px;
  white-space:nowrap;
}
.progress-track{
  width:90px;height:5px;border-radius:3px;
  background:var(--border);
  overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--pass);
  width:0%;
  transition:width .25s ease;
}

.content{
  padding:30px 40px 120px;
  max-width:900px;
}
.part-header{margin-bottom:22px;}
.part-eyebrow{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--accent);
  letter-spacing:0.08em;
  text-transform:uppercase;
}
.part-title{
  font-family:var(--display);
  font-size:26px;
  font-weight:600;
  margin:6px 0 0;
  color:var(--text-primary);
}
.sub-title{
  font-family:var(--mono);
  font-size:13px;
  color:var(--text-secondary);
  margin:28px 0 14px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border-soft);
}

.prose p{margin:0 0 12px;color:var(--text-secondary);}
.prose strong{color:var(--text-primary);}
.prose h5{
  font-family:var(--display);
  font-size:14px;color:var(--text-primary);
  margin:18px 0 8px;
}
.prose ul,.prose ol{margin:0 0 14px;padding-left:20px;color:var(--text-secondary);}
.prose li{margin-bottom:6px;}

/* ---------- Question card (test block) ---------- */
.qcard{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:14px;
  overflow:hidden;
  transition:border-color .15s;
}
.qcard.passed{border-color:rgba(111,174,143,0.4);}
.qhead{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  cursor:pointer;
}
.qcheck{
  flex-shrink:0;
  width:20px;height:20px;
  border-radius:5px;
  border:1.5px solid var(--border);
  margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  color:transparent;
  transition:all .15s;
}
.qcard.passed .qcheck{
  background:var(--pass);
  border-color:var(--pass);
  color:#0e1014;
}
.qnum{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--text-dim);
  flex-shrink:0;
  margin-top:2px;
  min-width:30px;
}
.qtext{
  flex:1;
  font-weight:600;
  color:var(--text-primary);
  font-size:14.5px;
}
.qchevron{
  flex-shrink:0;
  color:var(--text-dim);
  font-family:var(--mono);
  font-size:12px;
  margin-top:3px;
  transition:transform .15s;
}
.qcard.open .qchevron{transform:rotate(90deg);}

.qbody{
  display:none;
  padding:0 16px 16px 16px;
  border-top:1px solid var(--border-soft);
}
.qcard.open .qbody{display:block;padding-top:14px;}

.ans-block{
  margin-bottom:10px;
  padding:10px 12px;
  border-radius:8px;
  background:var(--bg-elevated);
}
.ans-tag{
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:0.06em;
  display:inline-block;
  padding:2px 7px;
  border-radius:5px;
  margin-bottom:6px;
  font-weight:600;
}
.ans-tag.hi{color:var(--hi-tag);background:var(--hi-tag-soft);}
.ans-tag.en{color:var(--en-tag);background:var(--en-tag-soft);}
.ans-text{color:var(--text-primary);font-size:13.8px;}
.cross-block{
  margin-top:10px;
  padding:10px 12px;
  border-left:2px solid var(--accent-dim);
  background:var(--accent-soft);
  border-radius:0 8px 8px 0;
}
.cross-label{
  font-family:var(--mono);
  font-size:10px;
  color:var(--accent);
  letter-spacing:0.06em;
  display:block;
  margin-bottom:4px;
}
.intent-block{
  margin-top:8px;
  font-size:12px;
  color:var(--text-dim);
  font-style:italic;
}
.intent-block b{color:var(--text-secondary);font-style:normal;}

.lang-hidden{display:none !important;}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--text-dim);
  font-family:var(--mono);
  font-size:13px;
}

/* mobile */
.menu-btn{display:none;}
@media (max-width:860px){
  .sidebar{
    position:fixed;left:0;top:0;z-index:20;
    transform:translateX(-100%);
    transition:transform .2s ease;
    width:78vw;max-width:300px;
    box-shadow:8px 0 24px rgba(0,0,0,0.4);
  }
  .sidebar.open{transform:translateX(0);}
  .menu-btn{
    display:flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:7px;
    background:var(--bg-elevated);border:1px solid var(--border);
    color:var(--text-secondary);font-family:var(--mono);
    cursor:pointer;flex-shrink:0;
  }
  .content{padding:22px 18px 100px;}
  .topbar{padding:10px 14px;gap:10px;}
  .search-wrap{order:3;max-width:none;flex:1 1 100%;}
  .scrim{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:15;
  }
  .scrim.show{display:block;}
}
</style>
</head>
<body>

<div class="app">
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-brand">~/aihifusion<span class="dot">/</span>prep <span class="dot">·</span> manish_singh</div>
      <div class="sidebar-title">Interview Test Suite</div>
      <div class="sidebar-sub">190 questions across 13 parts</div>
    </div>
    <nav class="tree" id="tree"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="breadcrumb"><span id="breadcrumbText">interview_prep.md</span><span class="cursor">▍</span></div>
      <div class="search-wrap">
        <span class="icon">⌕</span>
        <input id="searchInput" type="text" placeholder="grep your prep... (e.g. FAISS, GIL, recall)">
      </div>
      <div class="lang-toggle" id="langToggle">
        <button data-lang="both" class="active">Both</button>
        <button data-lang="hinglish">हिं</button>
        <button data-lang="english">EN</button>
      </div>
      <div class="progress-pill">
        <span id="progressText">0 / 190 passed</span>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
const DATA = [{"title": "PART 1 — Company Reality Check & Fit Analysis", "subsections": [{"title": "_default", "questions": [], "prose": "<p><strong>What AIHIFusion actually does:</strong> Small Delhi-based AI product company (~24 people, founded 2022). They build generative AI products for <strong>fashion, healthcare, and finance</strong> — image-to-image, text-to-image, text-to-text AI, using GANs, VAEs, diffusion models, and transformers. This is an applied GenAI product shop, not a chip/compiler company.</p><p><strong>Important mismatch to know going in:</strong> The JD text you were given (Make/CMake, Gerrit, DejaGNU automation for GCC/binutils/glibc, CUDA/OpenCL) is compiler-toolchain / hardware-enablement language — typical of semiconductor companies building AI accelerator software stacks, NOT a 24-person GenAI product startup. This is very likely a templated/reused JD (common on Indian job boards). Don't panic-learn CUDA/Gerrit — prep what they'll actually ask.</p><p><strong>What they likely actually hire for (Associate SE, 0-1 yr):</strong></p><ul><li>Solid Python fundamentals + ability to read/write clean code</li><li>Basic ML/DL conceptual understanding (regression, CNNs, transformers — they use GANs/diffusion/transformers)</li><li>Evidence you <em>actually built</em> what's on your resume (they will grill projects hard — small teams can't carry someone who fakes it)</li><li>Reasonable Linux/Git hygiene</li><li>Problem-solving under pressure (DSA basics, not LeetCode-hard)</li></ul><p><strong>Why your profile matches well:</strong></p><ul><li>RAG/LangChain/FAISS + Hugging Face experience directly overlaps with \"text-to-text AI\" work</li><li>CuraLink (API integration, fallback handling, multi-source retrieval) shows real backend/production thinking</li><li>LuminaPath (CNN, 63%→84% accuracy improvement) shows you understand the DL fundamentals -&gt; CV pipeline, transferable to image-to-image work</li><li>Two internships with measurable outcomes (R² ~0.90, 40% effort reduction) — gives you concrete numbers to defend</li></ul><p><strong>Honest weak areas (gaps they may probe):</strong></p><ol><li>No C++ project on resume despite JD asking for it — be ready with an honest \"I'm Python-first, comfortable picking up C++ basics\" answer, don't bluff.</li><li>No GAN/diffusion model experience — your GenAI exposure is RAG/retrieval, not generative image models. If asked, be upfront and pivot to your understanding of transformer/attention fundamentals which transfer.</li><li>Internship outcomes are good but light on production/deployment depth (no mention of monitoring, CI/CD in practice, load testing) — they may push on \"what happens after deployment.\"</li><li>CGPA 7.7 — unlikely to come up for an SE role, but have a one-line non-defensive answer ready (\"focused more on building production projects than topping GPA charts\").</li><li>Two-month and ~3.5-month internships — short duration, may be asked \"what's the deepest thing you actually owned in that time.\"</li></ol><p><strong>Likely gap-driven questions:</strong></p><ul><li>\"JD asks for C++ — your resume is all Python. How comfortable are you picking it up?\"</li><li>\"We work with GANs/diffusion models — your projects are RAG-based. How would you ramp up on generative image models?\"</li><li>\"Your internships were 2-4 months — what's one thing you built end-to-end, fully on your own?\"</li></ul>"}]}, {"title": "PART 2 — Tell Me About Yourself", "subsections": [{"title": "30-Second Version", "questions": [], "prose": "<p><strong>Hinglish:</strong> \"Main Manish, AI/ML Engineering background se, RNS Institute of Technology se B.E. final year kar raha hoon. Mera focus LLM applications aur RAG systems pe raha hai — maine LangChain aur FAISS use karke document Q&amp;A system banaya hai, aur ek CNN-based retinal disease detection project bhi kiya hai jisme accuracy 63% se 84% tak improve ki. Do internships kiye hain jaha ML models build aur deploy kiye. Ab main aise role dhoondh raha hoon jaha main real AI products pe kaam kar sakoon.\"</p><p><strong>English:</strong> \"I'm Manish, final-year AI &amp; Data Science engineering student at RNS Institute of Technology. My focus has been LLM applications and RAG systems — I built a document Q&amp;A pipeline using LangChain and FAISS, and a CNN-based retinal disease detection system where I improved accuracy from 63% to 84%. I've done two ML internships building and deploying models, and I'm now looking to apply that on real production AI products.\"</p>"}, {"title": "60-Second Version", "questions": [], "prose": "<p><strong>Hinglish:</strong> \"Main Manish Kumar Singh, currently RNS Institute of Technology se AI and Data Science me B.E. final year kar raha hoon, graduation December 2026 me. Mera kaam mostly do directions me raha hai — pehla, applied machine learning aur deep learning, jaise LuminaPath project jisme maine 36,000+ OCT images pe CNN train kiya retinal disease detect karne ke liye, accuracy 63% se 84% tak le gaya through preprocessing aur architecture tuning. Doosra, Generative AI aur LLM systems — Brainwave RAG Assistant banaya LangChain aur FAISS ke saath, jisme document ingestion, chunking, embeddings aur OpenAI API integration shamil hai. Iske alawa CuraLink banaya — ek medical research assistant jo PubMed, ClinicalTrials.gov aur OpenAlex APIs ko integrate karta hai. Do internships ki hain — TechnoHacks me sales prediction model (R² ~0.90) banaya aur Flask API se deploy kiya, aur Take It Smart me regression/classification models pe kaam kiya NLP preprocessing ke saath. Ab main aise role chahta hoon jaha main yeh skills production-grade AI systems banane me use kar sakoon.\"</p><p><strong>English:</strong> \"I'm Manish Kumar Singh, final-year B.E. student in AI and Data Science at RNS Institute of Technology, graduating December 2026. My work has gone in two directions — applied ML/DL, like LuminaPath, where I trained a CNN on 36,000+ OCT images for retinal disease detection and improved accuracy from 63% to 84% through preprocessing and architecture tuning. And second, generative AI / LLM systems — I built Brainwave, a RAG-based document Q&amp;A assistant using LangChain and FAISS, covering ingestion, chunking, embeddings, and OpenAI API integration. I also built CuraLink, a medical research assistant that integrates PubMed, ClinicalTrials.gov, and OpenAlex APIs with fallback handling for reliability. On the internship side, I built a sales prediction model with ~0.90 R² at TechnoHacks and deployed it via a Flask API, and worked on regression/classification with NLP preprocessing at Take It Smart. I'm now looking for a role where I can apply these skills to real production AI systems.\"</p>"}, {"title": "90-Second Version (adds depth + motivation)", "questions": [], "prose": "<p><strong>Hinglish:</strong> <em>(60-second version + add:)</em> \"Jo cheez mujhe sabse zyada attract karti hai AI engineering me, woh hai real-world reliability ka challenge — jaise CuraLink me maine APIs fail hone par bhi fallback handling banaya, taaki user ko hamesha response mile. Yeh same mindset main production AI systems me lana chahta hoon — sirf model accuracy nahi, balki system ki reliability aur scalability bhi important hai mere liye.\"</p><p><strong>English:</strong> <em>(60-second version + add:)</em> \"What draws me most to AI engineering is the reliability challenge of real systems — in CuraLink, I built fallback handling so the assistant stays usable even when an external API fails. That's the mindset I want to bring to production AI work: not just model accuracy, but system reliability and scalability.\"</p>"}, {"title": "HR Round Answer (focus: motivation, culture fit, career intent)", "questions": [], "prose": "<p><strong>Hinglish:</strong> \"Main aise companies ki taraf attract hota hoon jo real AI products bana rahi hain, na ki sirf research papers. AIHIFusion jaise companies me, jaha team chhoti hai aur impact directly dikhta hai, mujhe lagta hai main jaldi seekhunga aur contribute kar paunga. Main long-term AI/ML engineering me career banana chahta hoon, aur fresher hone ke bawajood maine already production-style projects (deployment, API integration, fallback handling) bana ke dikhaya hai ki main sirf theory tak limited nahi hoon.\"</p><p><strong>English:</strong> \"I'm drawn to companies actually shipping AI products, not just research. In a smaller team like AIHIFusion's, where impact is direct and visible, I think I'll learn fast and contribute quickly. I want to build a long-term career in AI/ML engineering, and despite being a fresher, I've already built production-style projects — deployment, API integration, fallback handling — to show I'm not limited to theory.\"</p>"}, {"title": "Technical Round Answer (focus: depth, lead with strongest technical project)", "questions": [], "prose": "<p><strong>Hinglish:</strong> \"Technically, mera strongest kaam Brainwave RAG Assistant hai. Maine ek full RAG pipeline banaya — document chunking strategy design ki, embeddings generate kiye, FAISS me vector index banaya, aur retrieval quality ko tune kiya taaki irrelevant responses kam ho. Iske parallel, LuminaPath me maine CNN architecture tuning aur data preprocessing se accuracy 63% se 84% tak badhayi — yeh mujhe deep learning fundamentals aur computer vision pipelines dono ki samajh deta hai.\"</p><p><strong>English:</strong> \"Technically, my strongest work is the Brainwave RAG Assistant — I designed the document chunking strategy, generated embeddings, built a FAISS vector index, and tuned retrieval to reduce irrelevant responses. In parallel, on LuminaPath, I improved CNN accuracy from 63% to 84% through architecture tuning and preprocessing — which gives me solid grounding in both DL fundamentals and CV pipelines.\"</p>"}]}, {"title": "PART 3 — Resume Line-by-Line Grilling (20 Qs)", "subsections": [{"title": "_default", "questions": [{"num": "1", "question": "Your summary says \"AI/ML Engineer\" but you're a fresher — isn't that an overstatement?", "hinglish": "\"Main isse 'AI/ML Engineer' is sense me likhta hoon ki maine end-to-end projects banaye hain — data se model tak, model se deployment tak. Title experience level nahi, balki kaam ka scope describe karta hai.\"", "english": "It describes the scope of work I've done (end-to-end ML pipelines), not a claim of senior experience.", "cross": "\"So what's the difference between you and someone with 2 years of experience?\" → Be honest: depth of production scale, not skill direction.", "intent": "Testing self-awareness vs. resume inflation."}, {"num": "2", "question": "Walk me through your summary — why these specific technologies (LangChain, FAISS, FastAPI, Docker, AWS)?", "hinglish": "\"Yeh wahi stack hai jo maine actually projects me use kiya — LangChain/FAISS Brainwave me, FastAPI/Docker/AWS deployment-side learning ke through. Maine sirf woh likha jo maine hands-on use kiya hai.\"", "english": "This is the exact stack I've hands-on used across my projects — nothing listed without direct usage.", "cross": "\"Show me a Docker command you've used recently.\" → Have 2-3 ready (build, run, ps).", "intent": "Checking if skills list is padded."}, {"num": "3", "question": "B.E. in AI and Data Science — what's the difference vs a standard CS degree, and did it actually help you?", "hinglish": "\"Humara curriculum CS fundamentals ke saath ML, DL, NLP, probability/statistics deeply cover karta hai. Isse mujhe early on hi applied ML projects karne ka exposure mila.\"", "english": "It blends CS fundamentals with dedicated ML/DL/NLP/stats coursework, giving early exposure to applied AI projects.", "cross": "\"What DBMS concepts do you remember?\" → Be ready on normalization, indexing, joins.", "intent": "Validating coursework relevance."}, {"num": "4", "question": "CGPA 7.7 — why not higher?", "hinglish": "\"Maine apna time projects aur internships pe zyada invest kiya — jaise LuminaPath, Brainwave — jo mujhe practical skills dete hain jo grades nahi de paate.\"", "english": "I prioritized hands-on projects and internships over maximizing GPA — that's where the practical skill-building happened.", "cross": "\"Don't grades reflect discipline though?\" → Acknowledge fairly, pivot to project consistency as your discipline evidence.", "intent": "Checking for defensiveness/maturity."}, {"num": "5", "question": "TechnoHacks — \"R² close to 0.90\" — what does that actually mean here, and is that good?", "hinglish": "\"R² 0.90 ka matlab hai model ne 90% variance explain ki sales data me. Sales data ke liye yeh achha score hai, kyunki real-world business data noisy hota hai.\"", "english": "R² of 0.90 means the model explains 90% of the variance in sales — strong for noisy real-world business data.", "cross": "\"What would you check before trusting this R² (e.g., overfitting)?\" → Mention train/test split validation, residual checks.", "intent": "Checking metric understanding, not just memorized number."}, {"num": "6", "question": "\"Flask API reducing manual processing by 40%\" — how exactly was that measured?", "hinglish": "\"Pehle predictions manually Excel me calculate hoti thi; API ke baad real-time predictions seedha milti thi, jisse processing time/steps significantly kam ho gaye — yeh estimate team ke before/after process time se aaya.\"", "english": "Before, predictions were manually computed; the API made them real-time, cutting the manual steps — the 40% was an estimated before/after comparison.", "cross": "\"Was this a controlled measurement or an estimate?\" → Be honest if it was an estimate, not a rigorous A/B test.", "intent": "Testing if metrics are real or invented."}, {"num": "7", "question": "\"Processed 10,000+ records using Pandas and NumPy\" — what kind of cleaning did you actually do?", "hinglish": "\"Missing values handle kiye, duplicate rows remove kiye, data types correct kiye, aur outliers detect/treat kiye before model training.\"", "english": "Handled missing values, removed duplicates, fixed data types, and treated outliers before training.", "cross": "\"How did you decide to drop vs impute missing values?\" → Mention missingness threshold / domain relevance reasoning.", "intent": "Verifying real data-cleaning experience."}, {"num": "8", "question": "Take It Smart — \"NLP preprocessing including tokenization and text cleaning\" — name the actual steps in order.", "hinglish": "\"Lowercasing, punctuation removal, tokenization, stopword removal, aur kabhi-kabhi stemming/lemmatization — yeh order maine follow kiya text cleaning ke liye.\"", "english": "Lowercasing → punctuation removal → tokenization → stopword removal → stemming/lemmatization where needed.", "cross": "\"Difference between stemming and lemmatization?\" → Stemming is rule-based truncation; lemmatization uses vocabulary/morphology for the correct base form.", "intent": "Checking if NLP line is genuine or buzzword."}, {"num": "9", "question": "Why two internships in different domains (sales prediction vs general structured data)? Was there a strategy?", "hinglish": "\"Pehla internship mujhe end-to-end ML deployment ka exposure diya, doosra mujhe broader data science workflow — EDA, multiple model types — ka exposure diya. Combination se main both build aur analyze dono comfortable hoon.\"", "english": "The first gave me deployment exposure, the second broadened my data science workflow across model types — together they cover both building and analyzing.", "cross": "\"Which did you enjoy more and why?\" → Answer honestly with a reason tied to growth, not just preference.", "intent": "Checking intentionality vs random internship-hopping."}, {"num": "10", "question": "Your skills list both TensorFlow and PyTorch — which one are you actually stronger in?", "hinglish": "\"TensorFlow me zyada hands-on hoon kyunki LuminaPath usi pe banaya hai. PyTorch ka use smaller experiments aur learning ke liye kiya hai.\"", "english": "Stronger in TensorFlow since LuminaPath was built on it; PyTorch experience is from smaller experiments/learning.", "cross": "\"Write the PyTorch equivalent of model.fit() conceptually.\" → Mention manual training loop (forward, loss, backward, optimizer.step()).", "intent": "Catching framework-padding."}, {"num": "11", "question": "You list \"Vector Search\" as a skill — explain it in one line without buzzwords.", "hinglish": "\"Vector search ka matlab hai text ko numeric embeddings me convert karke, similarity (jaise cosine similarity) ke basis pe sabse relevant documents dhoondhna, exact keyword match ki jagah.\"", "english": "Converting text to numeric embeddings and finding the most relevant documents by similarity (e.g., cosine similarity) instead of exact keyword matching.", "cross": "\"Why not just use keyword search?\" → Keyword search misses semantic meaning/paraphrasing; embeddings capture that.", "intent": "Testing real understanding vs term-dropping."}, {"num": "12", "question": "\"API Integration\" is listed under \"Other\" — which APIs have you actually integrated, and what was the hardest part?", "hinglish": "\"PubMed, ClinicalTrials.gov, OpenAlex (CuraLink me), OpenAI API (Brainwave me). Hardest part tha different APIs ke rate limits aur inconsistent response formats handle karna.\"", "english": "PubMed, ClinicalTrials.gov, OpenAlex in CuraLink, and OpenAI API in Brainwave. The hardest part was handling differing rate limits and inconsistent response formats across them.", "cross": "\"How did you handle rate limiting specifically?\" → Mention retries/backoff or fallback logic (tie to your \"API fallback handling\" bullet).", "intent": "Verifying depth behind a one-line skill."}, {"num": "13", "question": "AWS EC2 and S3 are listed — describe one specific thing you've done on each.", "hinglish": "\"EC2 pe maine ek model/app deploy karne ke liye instance setup kiya; S3 ka use mainly dataset/model artifact storage ke liye kiya.\"", "english": "Used EC2 to set up an instance for deploying an app/model, and S3 mainly for storing datasets/model artifacts.", "cross": "\"What instance type, and why?\" → Be ready to admit it was a basic free-tier/t2.micro level setup if true — don't overclaim production-scale infra experience.", "intent": "Probing depth of cloud experience (often shallow for freshers — be honest)."}, {"num": "14", "question": "Docker is listed — what would you put in a Dockerfile for one of your Flask apps?", "hinglish": "\"Base image (python:3.x), dependencies install (requirements.txt), code copy, port expose, aur app run command (CMD) — yeh basic structure follow karta hoon.\"", "english": "Base Python image, install dependencies from requirements.txt, copy code, expose the port, and a CMD to run the app.", "cross": "\"Difference between CMD and ENTRYPOINT?\" → CMD is the default, overridable command; ENTRYPOINT is fixed and CMD becomes its arguments.", "intent": "Checking if Docker is real hands-on or just resume keyword."}, {"num": "15", "question": "\"CI/CD\" is listed under Deployment &amp; Cloud — describe a pipeline you've actually set up or used.", "hinglish": "\"Honestly, mera exposure CI/CD ka conceptual aur basic GitHub Actions level ka hai, full production pipeline nahi banaya hai abhi.\"", "english": "Honestly, my CI/CD exposure is conceptual / basic GitHub Actions level — I haven't built a full production pipeline yet.", "cross": "\"What would a basic CI pipeline for one of your Flask apps look like?\" → Outline: lint → test → build → deploy stages.", "intent": "This is a likely \"soft trap\" line — be ready to admit limited depth rather than bluff."}, {"num": "16", "question": "Your GitHub link is on the resume — what's the commit history / activity like on your project repos?", "hinglish": "\"Mera commit history feature-wise hai — jaise data preprocessing, model training, API integration alag commits me hain — taaki progress track ho sake.\"", "english": "Commits are organized by feature (preprocessing, model training, API integration) to keep progress traceable.", "cross": "\"Show me your commit messages style.\" → Be ready to actually pull this up if asked live.", "intent": "Verifying the repo is real and actively maintained by you."}, {"num": "17", "question": "Certifications — Google Cloud AI Series and Kaggle Data Cleaning &amp; Visualization — what did each actually teach you that you've applied?", "hinglish": "\"Google Cloud AI series se mujhe cloud-based ML services ka overview mila; Kaggle course se structured data cleaning techniques mile jo maine TechnoHacks internship me directly apply kiye.\"", "english": "The Google Cloud series gave an overview of cloud ML services; the Kaggle course gave structured data-cleaning techniques I directly applied during the TechnoHacks internship.", "cross": "\"Name one specific GCP AI service covered.\" → Have at least one ready (e.g., Vertex AI) so this doesn't sound vague.", "intent": "Checking certs aren't just resume decoration."}, {"num": "18", "question": "SQL is listed under Programming Languages — write a query to get the top 5 highest values from a table.", "hinglish": "\"SELECT * FROM table_name ORDER BY column_name DESC LIMIT 5; — yeh basic query top 5 records descending order me deta hai.\"", "english": "<code>SELECT * FROM table_name ORDER BY column_name DESC LIMIT 5;</code>", "cross": "\"How would you get the top 5 per category/group?\" → Mention window functions (RANK()/ROW_NUMBER() with PARTITION BY).", "intent": "Quick filter for basic SQL competence."}, {"num": "19", "question": "JavaScript is listed — but it only shows up in CuraLink (React/Node). How comfortable are you with it really?", "hinglish": "\"Frontend workflows aur basic Node.js backend logic ke liye comfortable hoon, but main primarily Python-first developer hoon.\"", "english": "Comfortable for frontend workflows and basic Node.js backend logic, but I'm primarily a Python-first developer.", "cross": "\"What's the difference between var, let, and const?\" → var is function-scoped/hoisted, let/const are block-scoped, const can't be reassigned.", "intent": "Calibrating real JS depth vs resume listing."}, {"num": "20", "question": "If I removed your resume right now, what's the ONE project you'd want to talk about for the next 20 minutes, and why?", "hinglish": "\"Brainwave RAG Assistant — kyunki ismein maine full pipeline design ki hai, end-to-end, aur yeh exactly GenAI-style kaam hai jo AIHIFusion karti hai.\"", "english": "Brainwave RAG Assistant — because I designed the full pipeline end-to-end, and it's the closest match to the GenAI work AIHIFusion does.", "cross": "(leads directly into Part 4 project interrogation)", "intent": "Open-ended confidence + self-awareness check; sets up deep-dive."}], "prose": ""}]}, {"title": "PART 4 — Project Interrogation Round", "subsections": [{"title": "A. LuminaPath — AI Retinal Disease Detection (15 Qs)", "questions": [{"num": "1", "question": "Walk me through the architecture — input to output.", "hinglish": "\"OCT image input leta hoon, preprocessing (resize, normalize) karta hoon, fir CNN architecture (conv + pooling layers) feature extract karta hai, dense layers classification karte hain, aur Flask backend ke through Streamlit UI pe prediction display hoti hai.\"", "english": "OCT image → preprocessing (resize/normalize) → CNN feature extraction (conv + pooling layers) → dense layers for classification → Flask backend serves the result to the Streamlit UI.", "cross": "\"Why CNN and not a simple feedforward network here?\" → CNNs preserve spatial structure in images via local receptive fields and shared weights, which dense layers don't.", "intent": ""}, {"num": "2", "question": "36,000+ OCT images — where did this dataset come from, and was it balanced across classes?", "hinglish": "\"Dataset publicly available OCT retinal dataset tha; classes thoda imbalanced thi, jisko maine augmentation aur class weighting se address kiya.\"", "english": "A publicly available OCT retinal dataset; classes were somewhat imbalanced, which I addressed with augmentation and class weighting.", "cross": "\"What specific augmentations did you use?\" → Rotation, flipping, brightness/contrast jitter, zoom — standard for medical image robustness.", "intent": ""}, {"num": "3", "question": "You went from 63% to 84% accuracy — what were the actual levers you pulled, in order?", "hinglish": "\"Pehle preprocessing fix ki (normalization, resizing consistency), fir data augmentation add ki, fir architecture tuning (layers, filters) ki, aur last me hyperparameters (learning rate, batch size) tune kiye.\"", "english": "First fixed preprocessing consistency, then added augmentation, then tuned the architecture (layers/filters), then tuned hyperparameters (learning rate, batch size).", "cross": "\"Which single change gave the biggest jump?\" → Be ready to commit to one (commonly preprocessing/augmentation gives the biggest early jump) — don't say \"all equally.\"", "intent": ""}, {"num": "4", "question": "84% accuracy — is accuracy even the right metric for a medical diagnosis model?", "hinglish": "\"Nahi, sirf accuracy kaafi nahi hai medical context mein — precision, recall (especially recall for disease-positive cases), aur F1-score zyada important hain kyunki false negatives costly hote hain.\"", "english": "No — accuracy alone isn't enough for medical diagnosis; precision, recall (especially recall for positive disease cases), and F1-score matter more since false negatives are costly.", "cross": "\"What was your recall for the disease-positive class?\" → If you don't have the exact number, be honest and say you'd prioritize tracking it more rigorously next time — don't invent a figure.", "intent": ""}, {"num": "5", "question": "Why Streamlit for the interface instead of a custom React frontend?", "hinglish": "\"Streamlit fast prototyping ke liye best hai — ML demo aur internal testing ke liye perfect, custom React frontend ki complexity ki zaroorat nahi thi yahan.\"", "english": "Streamlit is built for fast ML prototyping — perfect for a demo/internal-testing interface; didn't need the complexity of a custom React frontend here.", "cross": "\"What would you change if this had to go to real patients in production?\" → Mention proper auth, audit logging, clinician-reviewed UI, and regulatory considerations.", "intent": ""}, {"num": "6", "question": "How exactly does the Flask backend connect to the Streamlit frontend and the model?", "hinglish": "\"Flask ek inference API expose karta hai jo trained model load karke prediction return karta hai; Streamlit us API ko call karta hai user input ke saath.\"", "english": "Flask exposes an inference API that loads the trained model and returns predictions; Streamlit calls that API with the user's input.", "cross": "\"Why not load the model directly inside Streamlit?\" → Separating inference into an API allows reuse by other clients and decouples the ML logic from the UI.", "intent": ""}, {"num": "7", "question": "How are PDF reports generated automatically?", "hinglish": "\"Prediction result aur related details ko ek PDF generation library (jaise ReportLab/FPDF) ke through structured report me format kiya jaata hai.\"", "english": "The prediction result and related details get formatted into a structured report using a PDF generation library.", "cross": "\"What's in the report besides the prediction label?\" → Confidence score, possibly a summary/recommendation note.", "intent": ""}, {"num": "8", "question": "What happens if the model is given a completely unrelated image (not an OCT scan)?", "hinglish": "\"Abhi explicit out-of-distribution detection nahi hai — yeh ek known limitation hai jo main improve karna chahunga, jaise input validation ya confidence-threshold check add karke.\"", "english": "There's no explicit out-of-distribution detection right now — that's a known limitation I'd want to improve, e.g. via input validation or a confidence-threshold check.", "cross": "\"How would you add that?\" → Mention a separate classifier/anomaly check before the main model, or simply rejecting low-confidence predictions.", "intent": ""}, {"num": "9", "question": "Describe a time this model failed or gave a wrong prediction — what did you do?", "hinglish": "\"Initial versions me model kuch specific disease classes ko confuse kar raha tha kam samples ke wajah se — maine targeted augmentation aur class balancing se isko address kiya.\"", "english": "Early versions confused certain disease classes due to fewer samples — I addressed it with targeted augmentation and class balancing.", "cross": "\"How did you detect the confusion in the first place?\" → Confusion matrix analysis per class.", "intent": ""}, {"num": "10", "question": "How would you optimize this model for faster inference, e.g., on a low-resource device?", "hinglish": "\"Model quantization, pruning, ya ek lighter architecture (jaise MobileNet-style) use kar sakte hain inference speed badhane ke liye.\"", "english": "Model quantization, pruning, or switching to a lighter architecture (e.g. MobileNet-style) to speed up inference.", "cross": "\"What's the accuracy trade-off there?\" → Lighter models typically lose some accuracy for speed — acknowledge that trade-off honestly.", "intent": ""}, {"num": "11", "question": "How would you scale this if 10,000 users hit it simultaneously?", "hinglish": "\"Single Flask instance kaafi nahi hoga — multiple instances ke peeche load balancer, model serving ko ek dedicated inference server (jaise TensorFlow Serving) pe move karna, aur caching add karna.\"", "english": "A single Flask instance wouldn't be enough — I'd put multiple instances behind a load balancer, move serving to a dedicated inference server (e.g. TensorFlow Serving), and add caching.", "cross": "\"Why TensorFlow Serving over plain Flask for this?\" → It's built for optimized, concurrent model serving with versioning support, unlike a basic Flask route.", "intent": ""}, {"num": "12", "question": "Why CNN and not a Vision Transformer (ViT) for this task?", "hinglish": "\"CNN ke saath smaller dataset pe bhi achha perform karna easier hota hai kyunki inductive bias (locality) already built-in hai; ViT ko usually bahut bada dataset chahiye achha perform karne ke liye.\"", "english": "CNNs generalize better on smaller datasets because of their built-in spatial inductive bias; ViTs typically need much larger datasets to perform well.", "cross": "\"Would you consider ViT if you had more data?\" → Yes, especially with transfer learning from a pretrained ViT.", "intent": ""}, {"num": "13", "question": "Did you use transfer learning, or train from scratch?", "hinglish": "\"Architecture tuning involved kuch pretrained backbone exploration bhi tha — but main detail jo maine improve ki woh thi preprocessing aur custom architecture tuning.\"", "english": "Be precise here based on what you actually did — if from scratch, say so; if you used a pretrained backbone, name it (e.g. ResNet/VGG) and explain why.", "cross": "\"Why that specific backbone?\" → Tie to dataset size / domain similarity reasoning.", "intent": ""}, {"num": "14", "question": "What's an alternative approach you considered but didn't use?", "hinglish": "\"Maine ensemble models (multiple CNNs combine karna) consider kiya tha better accuracy ke liye, but complexity aur inference time ki wajah se single tuned model pe stick kiya.\"", "english": "I considered ensembling multiple CNNs for better accuracy, but stuck with a single tuned model due to complexity and inference-time cost.", "cross": "\"When would ensembling be worth it?\" → When accuracy matters more than latency, e.g. offline batch screening.", "intent": ""}, {"num": "15", "question": "How would you validate this model is safe enough for real clinical use?", "hinglish": "\"Clinical-grade validation ke liye external test set pe evaluation, ophthalmologist se ground-truth verification, aur regulatory (jaise FDA/CE-type) approval process zaroori hoga — abhi yeh ek academic/demo-level project hai.\"", "english": "It would need evaluation on an external test set, ground-truth verification by ophthalmologists, and a regulatory approval process — currently this is an academic/demo-level project, not clinically validated.", "cross": "\"So would you recommend deploying this today?\" → No — be clear this is a proof-of-concept, not production-medical-grade.", "intent": ""}], "prose": ""}, {"title": "B. CuraLink — AI Medical Research Assistant (15 Qs)", "questions": [{"num": "1", "question": "Walk me through the architecture end-to-end.", "hinglish": "\"User query frontend (React) se aata hai, Node.js/Express backend usko relevant API (PubMed/ClinicalTrials/OpenAlex) ko route karta hai, results aggregate karta hai, Hugging Face model se summarize/QA karta hai, aur response React frontend pe display hota hai.\"", "english": "User query comes from the React frontend → Node.js/Express backend routes it to the relevant API (PubMed/ClinicalTrials/OpenAlex) → aggregates results → Hugging Face model handles summarization/QA → response is displayed in React.", "cross": "\"Are the 3 APIs called in parallel or sequentially?\" → Be ready to commit — parallel is more efficient and the better answer if true.", "intent": ""}, {"num": "2", "question": "Why three different data sources instead of just one?", "hinglish": "\"PubMed papers ke liye, ClinicalTrials.gov ongoing trials ke liye, aur OpenAlex broader academic research coverage ke liye — teeno alag perspective dete hain ek hi medical query pe.\"", "english": "PubMed for papers, ClinicalTrials.gov for ongoing trials, OpenAlex for broader academic coverage — each gives a different angle on the same medical query.", "cross": "\"How do you merge/de-duplicate overlapping results across sources?\" → If not done, acknowledge it as a known gap/future improvement.", "intent": ""}, {"num": "3", "question": "Explain the \"API fallback handling\" bullet in detail — what exactly happens when an API fails?", "hinglish": "\"Agar ek API fail hoti hai (timeout/error), to system doosri available sources se results return karta hai instead of completely failing, aur user ko ek graceful message milta hai.\"", "english": "If one API fails (timeout/error), the system falls back to results from the other available sources instead of failing completely, and the user gets a graceful message.", "cross": "\"What's your retry strategy — immediate retry, exponential backoff, or no retry?\" → Be specific; if it's simple try/catch with fallback (no backoff), say so honestly.", "intent": ""}, {"num": "4", "question": "How do you handle rate limits across three different external APIs?", "hinglish": "\"Har API ki apni rate limit hai — maine request throttling aur error handling add ki taaki ek API ka rate limit doosre ko block na kare.\"", "english": "Each API has its own rate limit — I added request throttling and error handling so one API's limit doesn't block the others.", "cross": "\"What would you add if this scaled to 10,000 daily users?\" → Caching frequent queries, a queue system, possibly paid API tiers.", "intent": ""}, {"num": "5", "question": "Which Hugging Face model(s) did you use, and why that one?", "hinglish": "\"Research-focused QA aur summarization ke liye ek pretrained transformer model use kiya — choice ka basis tha biomedical/general text pe achha performance aur reasonable inference speed.\"", "english": "Be specific about which model family (e.g. a BERT-based QA model or a summarization transformer) — chosen for good performance on biomedical/general text with reasonable inference speed.", "cross": "\"Did you fine-tune it, or use it off-the-shelf?\" → Be honest — likely off-the-shelf for a project at this stage.", "intent": ""}, {"num": "6", "question": "How do you ensure the summarized research info isn't misleading or hallucinated?", "hinglish": "\"Summarization extractive/source-grounded rakhne ki koshish ki, aur original source links bhi provide kiye taaki user verify kar sake.\"", "english": "Tried to keep summarization grounded in the source text, and always provide original source links so users can verify.", "cross": "\"What's the difference between extractive and abstractive summarization here?\" → Extractive pulls exact sentences from source; abstractive generates new phrasing — riskier for hallucination.", "intent": ""}, {"num": "7", "question": "Why Node.js/Express for backend instead of Flask/FastAPI like your other projects?", "hinglish": "\"CuraLink ka frontend React tha, to Node.js/Express ke saath same JavaScript ecosystem me kaam karna integration ko simpler banata hai.\"", "english": "Since the frontend was React, using Node.js/Express kept the whole stack in one JavaScript ecosystem, simplifying integration.", "cross": "\"Would Python (FastAPI) have been better given Hugging Face models are Python-native?\" → Acknowledge the trade-off — likely called Hugging Face via API/inference endpoint rather than running models natively in Node.", "intent": ""}, {"num": "8", "question": "How does the React frontend communicate with the backend — REST, polling, websockets?", "hinglish": "\"REST APIs ke through — frontend request bhejta hai, backend process karke JSON response return karta hai.\"", "english": "Via REST APIs — frontend sends a request, backend processes and returns a JSON response.", "cross": "\"What would change if you needed real-time streaming responses (like ChatGPT-style typing)?\" → Would need websockets or server-sent events (SSE) for token streaming.", "intent": ""}, {"num": "9", "question": "Describe a specific failure you hit while building this and how you debugged it.", "hinglish": "\"Ek baar APIs ka response format inconsistent tha (different JSON structures), jisse frontend crash ho jaata tha — maine response normalization layer add ki backend me.\"", "english": "At one point, the APIs returned inconsistent JSON structures, which broke the frontend — I added a response-normalization layer in the backend to fix it.", "cross": "\"Where exactly did you put that normalization — backend or frontend?\" → Backend is the better answer (single source of truth).", "intent": ""}, {"num": "10", "question": "How would you add caching to reduce repeated calls to PubMed/ClinicalTrials/OpenAlex?", "hinglish": "\"Common/repeated queries ke liye Redis jaisa in-memory cache use kar sakte hain, taaki same query dobara API hit na kare.\"", "english": "Use an in-memory cache like Redis for common/repeated queries so the same query doesn't re-hit the external API.", "cross": "\"How would you decide cache expiry/TTL for medical research data?\" → Research data changes slowly — longer TTL (hours/days) is reasonable vs. real-time data.", "intent": ""}, {"num": "11", "question": "How would you scale this if it became a real product with thousands of concurrent users?", "hinglish": "\"Backend ko stateless services me split karna, load balancer add karna, caching layer, aur external API calls ko queue/batch karna rate limits handle karne ke liye.\"", "english": "Split the backend into stateless services behind a load balancer, add a caching layer, and queue/batch external API calls to manage rate limits.", "cross": "\"What's the bottleneck most likely to hit first?\" → External API rate limits, most likely — that's outside your control, unlike your own infra.", "intent": ""}, {"num": "12", "question": "What security considerations did you think about, given it's medical-adjacent data?", "hinglish": "\"User input sanitize kiya API injection se bachne ke liye, aur koi sensitive personal patient data store nahi kiya — sirf research queries handle hoti hain.\"", "english": "Sanitized user input to prevent injection issues, and didn't store any sensitive personal patient data — it only handles research queries, not patient records.", "cross": "\"What if a user pasted real patient data into a query box?\" → Acknowledge this as a real risk worth adding input filtering/warnings for.", "intent": ""}, {"num": "13", "question": "What's an alternative architecture you considered?", "hinglish": "\"Ek single unified search API banane ka socha tha (sab sources ko pehle se merge karke ek hi index me), but real-time freshness ke liye direct API calls better lage.\"", "english": "Considered pre-merging all sources into one unified search index, but direct real-time API calls were better for data freshness.", "cross": "\"What's the trade-off there?\" → Pre-built index = faster search but stale data; direct calls = fresher but slower and rate-limited.", "intent": ""}, {"num": "14", "question": "How do you handle a query with zero results across all three sources?", "hinglish": "\"User ko clear message milta hai ki results nahi mile, with suggestion to rephrase query — silent failure nahi hota.\"", "english": "The user gets a clear \"no results found\" message with a suggestion to rephrase — no silent failure.", "cross": "\"Could you suggest related/broader queries automatically?\" → Good improvement idea — acknowledge it as a next step.", "intent": ""}, {"num": "15", "question": "If AIHIFusion asked you to add a GenAI image component (matching their fashion/healthcare focus) to CuraLink, how would you approach it?", "hinglish": "\"Main pehle scope clarify karunga — jaise medical imaging visualization ya diagram generation — fir relevant pretrained generative model (diffusion-based) integrate karunga via API, similar pattern jaise maine Hugging Face integrate kiya.\"", "english": "I'd first clarify the scope (e.g. medical imaging visualization or diagram generation), then integrate a relevant pretrained generative model (diffusion-based) via API, following the same integration pattern I used for Hugging Face.", "cross": "\"Have you worked with diffusion models directly?\" → Be honest if not — pivot to your understanding of the underlying transformer/attention concepts as a learning foundation.", "intent": ""}], "prose": ""}, {"title": "C. Brainwave RAG Assistant (15 Qs) — your strongest project, expect the deepest drilling here", "questions": [{"num": "1", "question": "Explain RAG in your own words, then walk through your specific pipeline.", "hinglish": "\"RAG ka matlab hai retrieval-augmented generation — pehle relevant documents retrieve karte hain vector search se, fir unko context ke saath LLM ko dete hain accurate answer generate karne ke liye. Mera pipeline: document ingestion → chunking → embeddings → FAISS index → query retrieval → OpenAI API context-aware generation.\"", "english": "RAG means retrieving relevant documents via vector search first, then feeding them as context to an LLM for accurate generation. My pipeline: ingestion → chunking → embeddings → FAISS index → retrieval → OpenAI API for context-aware generation.", "cross": "\"Why not just fine-tune the LLM on your documents instead of RAG?\" → Fine-tuning is expensive, static, and needs retraining for new data; RAG lets you update the knowledge base instantly without retraining.", "intent": ""}, {"num": "2", "question": "What chunking strategy did you use, and why?", "hinglish": "\"Fixed-size chunking with overlap use kiya — taaki context boundaries pe information lose na ho. Chunk size aur overlap ko experiment karke tune kiya.\"", "english": "Fixed-size chunking with overlap, to avoid losing context at chunk boundaries — tuned chunk size and overlap experimentally.", "cross": "\"What problems come from chunks being too big vs too small?\" → Too big = irrelevant info dilutes retrieval relevance and wastes context window; too small = loses surrounding context needed to answer correctly.", "intent": ""}, {"num": "3", "question": "Why FAISS specifically, instead of Pinecone, Weaviate, or Chroma?", "hinglish": "\"FAISS open-source, free, aur local/lightweight setup ke liye perfect tha is project ke scale ke liye — managed vector DBs (Pinecone) zyada production-scale, multi-user setups ke liye better hain.\"", "english": "FAISS is open-source, free, and lightweight for local setups at this project's scale — managed vector DBs like Pinecone are better suited for production, multi-user scale.", "cross": "\"When would you switch to a managed vector DB?\" → When you need persistence across deployments, multi-tenant scaling, metadata filtering, and built-in infra management.", "intent": ""}, {"num": "4", "question": "How do embeddings actually work — explain it simply.", "hinglish": "\"Embeddings text ko ek high-dimensional numeric vector me convert karte hain jaha semantically similar text vectors close hote hain space me — isse hum meaning-based comparison kar sakte hain, exact words match karne ki jagah.\"", "english": "Embeddings convert text into high-dimensional numeric vectors where semantically similar text ends up close together in that space — enabling meaning-based comparison instead of exact word matching.", "cross": "\"What embedding model did you use, and why?\" → Name it specifically (e.g. OpenAI's embedding model) — chosen for quality/compatibility with the rest of the OpenAI-based pipeline.", "intent": ""}, {"num": "5", "question": "What's a vector index actually doing under the hood (e.g., what does FAISS do internally)?", "hinglish": "\"FAISS ek efficient similarity search structure banata hai (jaise IVF/flat index) jisse query vector ke nearest-neighbor vectors fast find ho jaate hain, bina har vector se brute-force compare kiye.\"", "english": "FAISS builds an efficient similarity-search structure (e.g. flat or IVF index) so nearest-neighbor vectors to a query can be found fast, without brute-force comparing against every vector.", "cross": "\"What's the trade-off between an exact (flat) index and an approximate one (like IVF/HNSW)?\" → Exact is more accurate but slower at scale; approximate indexes trade a small accuracy loss for much faster search on large datasets.", "intent": ""}, {"num": "6", "question": "\"Reduced irrelevant responses through retrieval tuning\" — what specifically did you tune?", "hinglish": "\"Chunk size/overlap, number of retrieved documents (top-k), aur similarity threshold — yeh teeno tune karke irrelevant matches kam kiye.\"", "english": "Tuned chunk size/overlap, the number of retrieved documents (top-k), and the similarity threshold — these reduced irrelevant matches.", "cross": "\"What top-k value did you land on, and why?\" → Have a specific number ready and a reason (balance between enough context and noise).", "intent": ""}, {"num": "7", "question": "How do you prevent hallucination in the generated answer?", "hinglish": "\"Prompt me explicitly instruct kiya LLM ko sirf retrieved context use karne ke liye, aur agar context me answer nahi hai to clearly bolne ke liye 'I don't know' type response.\"", "english": "Explicitly instructed the LLM in the prompt to only use the retrieved context, and to say it doesn't know if the answer isn't present, rather than guessing.", "cross": "\"Is that prompt instruction always reliable?\" → No — be honest that prompt instructions reduce but don't fully eliminate hallucination; it's a known open problem in RAG systems.", "intent": ""}, {"num": "8", "question": "What's in your actual prompt template sent to OpenAI — describe its structure.", "hinglish": "\"System instruction (context-only answer karne ke liye), fir retrieved chunks insert hote hain context section me, aur last me user ka actual question add hota hai.\"", "english": "A system instruction (answer only from context), then the retrieved chunks inserted as the context section, followed by the user's actual question.", "cross": "\"How do you handle it if retrieved chunks + question exceed the model's context window/token limit?\" → Truncate to top-k highest-relevance chunks first, or use a smaller/cheaper summarization pass before the final prompt.", "intent": ""}, {"num": "9", "question": "How did you actually test/evaluate retrieval quality — not just generation quality?", "hinglish": "\"Manually different queries test ki aur check kiya ki retrieved chunks actually relevant hain ya nahi, different chunking/embedding strategies compare karke.\"", "english": "Manually tested various queries and checked whether retrieved chunks were actually relevant, comparing across different chunking/embedding strategies.", "cross": "\"Did you use any quantitative metric (like precision@k or recall@k) or was it purely qualitative?\" → Be honest if it was qualitative/manual — and mention precision@k/recall@k as the proper way to do this rigorously next time.", "intent": ""}, {"num": "10", "question": "What happens if a user asks a question completely unrelated to the ingested documents?", "hinglish": "\"Retrieval low-similarity results return karega, aur prompt instruction ke wajah se model 'context me available nahi hai' type answer dega instead of hallucinate karne ke.\"", "english": "Retrieval returns low-similarity results, and due to the prompt instruction, the model responds that the answer isn't available in context instead of hallucinating.", "cross": "\"How would you detect this automatically (without relying on the LLM to self-report)?\" → Check the similarity score of top retrieved chunks against a threshold before even calling the LLM.", "intent": ""}, {"num": "11", "question": "How would you scale this from one document to 10,000 documents?", "hinglish": "\"FAISS index ko ek more scalable approach (sharded index ya managed vector DB) me move karna, aur ingestion pipeline ko batch/async banana taaki bottleneck na bane.\"", "english": "Move the FAISS index to a more scalable setup (sharded index or a managed vector DB), and make the ingestion pipeline batch/async so it doesn't bottleneck.", "cross": "\"Would flat FAISS still work at that scale, or would you switch index type?\" → At 10K+ documents, an approximate index (IVF/HNSW) becomes worth it for speed.", "intent": ""}, {"num": "12", "question": "What's the cost implication of using OpenAI's API here, and how would you optimize it?", "hinglish": "\"Har query embedding generate karne aur completion call karne ka cost hai — caching frequent queries, chunk size optimize karna, aur cheaper model variant use karna cost kam kar sakta hai.\"", "english": "Every query incurs cost for embedding generation and the completion call — caching frequent queries, optimizing chunk size, and using a cheaper model variant can reduce cost.", "cross": "\"Would you ever consider a self-hosted open-source LLM instead of OpenAI's API?\" → Yes, viable trade-off: lower per-query cost and full control vs. more infra/ops overhead and possibly lower quality.", "intent": ""}, {"num": "13", "question": "What's an alternative to FAISS + OpenAI you considered, and why didn't you use it?", "hinglish": "\"Open-source LLM (jaise Llama-based) self-host karne ka socha tha cost bachane ke liye, but setup/infra complexity ki wajah se OpenAI API se start kiya prototype ke liye.\"", "english": "Considered self-hosting an open-source LLM (Llama-based) to save cost, but went with the OpenAI API for the prototype given setup/infra complexity.", "cross": "\"What would push you to switch later?\" → Cost at scale, or data privacy requirements that prevent sending data to a third-party API.", "intent": ""}, {"num": "14", "question": "How would this RAG pipeline need to change for AIHIFusion's actual domain (fashion/healthcare/finance text-to-text)?", "hinglish": "\"Domain-specific embeddings ya fine-tuned embedding model use karna pad sakta hai, aur chunking strategy ko domain document structure (jaise fashion catalogs ya financial reports) ke according adjust karna hoga.\"", "english": "Might need domain-specific or fine-tuned embeddings, and the chunking strategy would need to adapt to the structure of domain documents (e.g. fashion catalogs or financial reports).", "cross": "\"Would the same FAISS setup work, or would you need something else?\" → FAISS itself is domain-agnostic — the main domain-specific work is in embeddings and chunking, not the vector store.", "intent": ""}, {"num": "15", "question": "Be honest — what's the single biggest weakness in this project as it stands today?", "hinglish": "\"Sabse badi weakness hai ki retrieval evaluation rigorous nahi hai — sirf qualitative testing hua hai, quantitative metrics (precision/recall@k) nahi measure kiye abhi tak.\"", "english": "The biggest weakness is that retrieval evaluation isn't rigorous yet — only qualitative testing was done, no quantitative metrics like precision/recall@k have been measured so far.", "cross": "\"What would you do first if you had one more week on this project?\" → Build a small eval set with ground-truth Q&amp;A pairs and measure retrieval precision/recall properly.", "intent": ""}], "prose": ""}]}, {"title": "PART 5 — Internship Interrogation (10 Qs)", "subsections": [{"title": "TechnoHacks Solutions (ML Intern, Jul–Aug 2025)", "questions": [{"num": "1", "question": "What exactly was your day-to-day work here?", "hinglish": "\"Data cleaning, feature engineering, model training (sales prediction), aur ek Flask API banana real-time predictions serve karne ke liye — yeh mera daily kaam tha.\"", "english": "Data cleaning, feature engineering, model training for sales prediction, and building a Flask API to serve real-time predictions.", "cross": "\"Were you working solo or with a team?\" → Answer honestly based on actual setup.", "intent": ""}, {"num": "2", "question": "Why did you choose scikit-learn over a deep learning approach for sales prediction?", "hinglish": "\"Structured/tabular sales data ke liye traditional ML models (jaise regression-based) usually deep learning se better aur faster perform karte hain, especially limited data ke saath.\"", "english": "For structured/tabular sales data, traditional ML models typically perform better and faster than deep learning, especially with limited data.", "cross": "\"Which specific algorithm did you end up using — linear regression, random forest, XGBoost?\" → Have one specific answer ready, don't be vague.", "intent": ""}, {"num": "3", "question": "How did you measure that your feature selection actually improved the model?", "hinglish": "\"Before/after R² aur RMSE compare karke — feature selection ke baad metrics improve hue, jo confirm karta hai ki irrelevant features remove karne se model better generalize kar raha tha.\"", "english": "By comparing R² and RMSE before and after — metrics improved after feature selection, confirming removing irrelevant features helped generalization.", "cross": "\"What technique did you use for feature selection — correlation, feature importance, RFE?\" → Have a specific technique ready.", "intent": ""}, {"num": "4", "question": "What mistake did you make during this internship, and what did you learn from it?", "hinglish": "\"Starting me maybe overfitting ka risk tha kyunki maine validation set properly separate nahi rakha tha — usse seekha ki train/validation split discipline kitni important hai.\"", "english": "Be honest with a real, specific mistake — e.g., not separating validation data carefully early on, leading to risk of overfitting, and what changed after.", "cross": "\"How do you make sure you don't repeat that mistake now?\" → Mention you now always set aside a validation/test split before any tuning.", "intent": ""}, {"num": "5", "question": "This was a short internship (about 2 months) — what's the ONE thing you fully owned, end-to-end?", "hinglish": "\"Flask API ko model ke saath integrate karna aur real-time prediction serve karna — yeh part maine fully independently design aur build kiya.\"", "english": "Integrating the Flask API with the model and serving real-time predictions — this part I designed and built fully independently.", "cross": "\"What would you do differently if you had this same task again with more time?\" → Add proper input validation, logging, and basic monitoring to the API.", "intent": ""}], "prose": ""}, {"title": "Take It Smart (Data Science Intern, Feb–May 2026)", "questions": [{"num": "6", "question": "What exactly was your day-to-day work here, and how is it different from TechnoHacks?", "hinglish": "\"Yahan focus broader tha — multiple structured datasets pe EDA, regression/classification models, aur NLP preprocessing — TechnoHacks single sales prediction product pe focused tha, yeh zyada exploratory tha.\"", "english": "Here the focus was broader — EDA across multiple structured datasets, regression/classification models, and NLP preprocessing — versus TechnoHacks which was focused on one sales-prediction product.", "cross": "\"Which did you find more valuable for your growth?\" → Answer honestly with a specific reason.", "intent": ""}, {"num": "7", "question": "Walk me through your EDA process on one specific dataset.", "hinglish": "\"Missing values check karna, distributions plot karna, correlations dekhna, outliers identify karna, aur target variable ke saath feature relationships explore karna.\"", "english": "Check missing values, plot distributions, examine correlations, identify outliers, and explore feature relationships with the target variable.", "cross": "\"What visualization tools did you use?\" → Matplotlib/Seaborn — be ready to name actual chart types you used (histograms, box plots, heatmaps).", "intent": ""}, {"num": "8", "question": "How did NLP preprocessing fit into a \"structured data\" internship — what was the actual use case?", "hinglish": "\"Kuch dataset me text fields (jaise reviews/comments) the jisko structured features me convert karna tha tokenization aur cleaning ke through, before model me feed karne ke.\"", "english": "Some datasets had text fields (like reviews/comments) that needed to be converted into structured features through tokenization and cleaning before feeding into the model.", "cross": "\"Did you convert text to numeric features — how (TF-IDF, embeddings, bag-of-words)?\" → Have a specific answer ready.", "intent": ""}, {"num": "9", "question": "How did you evaluate classification vs regression models differently?", "hinglish": "\"Regression ke liye RMSE/R² use kiya; classification ke liye confusion matrix, accuracy, aur kabhi precision/recall use kiya depending on class balance.\"", "english": "For regression I used RMSE/R²; for classification, confusion matrix and accuracy, and precision/recall depending on class balance.", "cross": "\"When would accuracy alone be misleading for a classification problem?\" → When classes are imbalanced — a model predicting only the majority class can still show high accuracy.", "intent": ""}, {"num": "10", "question": "This internship runs through May 2026 — is it still ongoing, or has it ended? How are you balancing it with job search and final year?", "hinglish": "\"Internship recently complete hua hai / complete ho raha hai, aur main isko apne final year coursework aur job search ke saath parallel manage kar raha hoon time-blocking se.\"", "english": "Answer based on actual current status — and explain you're managing it alongside final-year coursework and job search through structured time-blocking.", "cross": "\"What's your strategy for staying consistent across all three?\" → Have a genuine, brief answer — interviewers like seeing real time-management discipline.", "intent": ""}], "prose": ""}]}, {"title": "PART 6 — Python Fundamentals (25 Qs)", "subsections": [{"title": "_default", "questions": [{"num": "1", "question": "Difference between list, tuple, and set?", "hinglish": "List mutable hai, tuple immutable, set unordered + unique elements.", "english": "List = mutable ordered; tuple = immutable ordered; set = unordered, unique elements only.", "cross": "\"Why use a tuple over a list ever?\" → Immutability = safer for fixed data, hashable (usable as dict keys), slightly faster.", "intent": ""}, {"num": "2", "question": "Difference between deep copy and shallow copy?", "hinglish": "Shallow copy nested objects ko reference copy karta hai; deep copy fully independent copy banata hai.", "english": "Shallow copy copies references to nested objects; deep copy creates fully independent copies.", "cross": "\"What module gives you both?\" → <code>copy</code> module — <code>copy.copy()</code> and <code>copy.deepcopy()</code>.", "intent": ""}, {"num": "3", "question": "What's a dictionary comprehension — give an example.", "hinglish": "Ek line me dictionary banane ka tareeka: <code>{k: v*2 for k, v in d.items()}</code>", "english": "<code>{k: v*2 for k, v in d.items()}</code> — concise dict construction in one line.", "cross": "\"Is it faster than a for loop?\" → Generally yes, slightly, due to optimized bytecode.", "intent": ""}, {"num": "4", "question": "Explain <em>args and </em>*kwargs.", "hinglish": "<code><em>args</code> variable positional arguments leta hai (tuple), <code></em>*kwargs</code> variable keyword arguments leta hai (dict).", "english": "<code><em>args</code> collects extra positional arguments as a tuple; <code></em>*kwargs</code> collects extra keyword arguments as a dict.", "cross": "\"Order of args, <em>args, </em><em>kwargs in a function signature?\" → Regular args → </em>args → default args → **kwargs.", "intent": ""}, {"num": "5", "question": "What is a lambda function, and when would you use one?", "hinglish": "Ek anonymous, single-expression function — short, throwaway logic ke liye (jaise <code>sorted()</code> ke key parameter me).", "english": "An anonymous single-expression function — used for short, throwaway logic, e.g. as a <code>key=</code> in <code>sorted()</code>.", "cross": "\"Why not use lambda for everything?\" → Hurts readability for complex logic; named functions are clearer and debuggable.", "intent": ""}, {"num": "6", "question": "Explain the four OOP pillars with one-line definitions.", "hinglish": "Encapsulation = data bundle + control access; Abstraction = complexity hide karna; Inheritance = reuse via parent-child; Polymorphism = same interface, different behavior.", "english": "Encapsulation = bundling data with controlled access; Abstraction = hiding implementation complexity; Inheritance = reusing behavior via parent-child classes; Polymorphism = same interface, different underlying behavior.", "cross": "\"Give a polymorphism example from your own code.\" → e.g., a <code>predict()</code> method behaving differently across model classes.", "intent": ""}, {"num": "7", "question": "Difference between method overriding and overloading — does Python truly support overloading?", "hinglish": "Overriding = child class parent ka method redefine karta hai; Python true overloading support nahi karta (default args/*args se simulate karte hain).", "english": "Overriding redefines a parent method in a child class; Python doesn't support true overloading — it's simulated via default args or *args.", "cross": "\"How would you simulate overloading?\" → Default parameter values or checking <code>*args</code> length inside one function.", "intent": ""}, {"num": "8", "question": "What's the difference between <code>@staticmethod</code> and <code>@classmethod</code>?", "hinglish": "Staticmethod ko class/instance ka access nahi hota; classmethod ko <code>cls</code> milta hai class-level access ke liye.", "english": "A staticmethod has no access to class/instance state; a classmethod receives <code>cls</code> for class-level access.", "cross": "\"When would you use classmethod over <code>__init__</code>?\" → For alternative constructors, e.g. <code>from_dict()</code>.", "intent": ""}, {"num": "9", "question": "Explain exception handling — try/except/else/finally.", "hinglish": "try = risky code, except = error handle, else = agar no exception, finally = hamesha run hota hai (cleanup ke liye).", "english": "try = risky code; except = handle the error; else = runs if no exception; finally = always runs (used for cleanup).", "cross": "\"Can you have multiple except blocks?\" → Yes, for handling different exception types differently.", "intent": ""}, {"num": "10", "question": "Difference between an iterator and a generator?", "hinglish": "Iterator ek object hai jo <code>__iter__</code>/<code>__next__</code> implement karta hai; generator ek function hai <code>yield</code> ke saath jo automatically iterator banata hai.", "english": "An iterator is an object implementing <code>__iter__</code>/<code>__next__</code>; a generator is a function using <code>yield</code> that automatically becomes an iterator.", "cross": "\"Why use a generator over a list for large data?\" → Memory efficient — values are produced lazily, one at a time, instead of all at once.", "intent": ""}, {"num": "11", "question": "What does <code>yield</code> actually do?", "hinglish": "Function ka execution pause karta hai aur value return karta hai, state preserve karte hue next call tak.", "english": "It pauses function execution and returns a value, preserving state until the next call.", "cross": "\"Difference between <code>yield</code> and <code>return</code>?\" → <code>return</code> ends the function; <code>yield</code> pauses it and can resume.", "intent": ""}, {"num": "12", "question": "What's a decorator? Give a real use case.", "hinglish": "Ek function jo doosre function ko wrap karta hai extra behavior add karne ke liye, bina original code change kiye — jaise logging ya timing.", "english": "A function that wraps another function to add behavior without modifying its code — e.g., logging or timing execution.", "cross": "\"Write a simple timer decorator structure.\" → <code>def timer(func): def wrapper(<em>a,</em><em>kw): start=time(); r=func(</em>a,**kw); print(time()-start); return r; return wrapper</code>", "intent": ""}, {"num": "13", "question": "What is the GIL (Global Interpreter Lock)?", "hinglish": "GIL ek lock hai jo ek time pe sirf ek thread ko Python bytecode execute karne deta hai — CPU-bound multithreading ko limit karta hai.", "english": "A lock that allows only one thread to execute Python bytecode at a time — it limits true parallelism for CPU-bound multithreading.", "cross": "\"How do you get around the GIL for CPU-bound work?\" → Use multiprocessing instead of multithreading.", "intent": ""}, {"num": "14", "question": "Difference between multithreading and multiprocessing in Python?", "hinglish": "Multithreading I/O-bound tasks ke liye achha hai (GIL ki wajah se limited CPU parallelism); multiprocessing separate processes use karta hai, true CPU parallelism deta hai.", "english": "Multithreading suits I/O-bound tasks (limited by the GIL for CPU work); multiprocessing uses separate processes for true CPU parallelism.", "cross": "\"Which would you use for parallel model inference on CPU?\" → Multiprocessing, since inference is typically CPU-bound.", "intent": ""}, {"num": "15", "question": "How does Python manage memory?", "hinglish": "Reference counting + garbage collector (cyclic garbage collection) ke through automatic memory management hota hai.", "english": "Through reference counting plus a garbage collector that handles cyclic references — fully automatic memory management.", "cross": "\"What causes a memory leak in Python despite GC?\" → Lingering references (e.g., in global caches or unclosed resources) preventing objects from being collected.", "intent": ""}, {"num": "16", "question": "What's the difference between <code>is</code> and <code>==</code>?", "hinglish": "<code>==</code> value compare karta hai; <code>is</code> identity (same memory object) compare karta hai.", "english": "<code>==</code> compares values; <code>is</code> compares object identity (same memory location).", "cross": "\"Why can <code>a == b</code> be True but <code>a is b</code> False?\" → Two different objects can hold equal values but live at different memory addresses.", "intent": ""}, {"num": "17", "question": "What's a mutable default argument bug?", "hinglish": "Default argument ke taur pe mutable object (jaise list) use karna dangerous hai kyunki woh ek hi instance reuse hoti hai calls ke beech.", "english": "Using a mutable
