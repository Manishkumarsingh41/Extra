 object (like a list) as a default argument is dangerous because it's shared across calls instead of being recreated each time.", "cross": "\"How do you fix it?\" → Use <code>None</code> as default and initialize inside the function.", "intent": ""}, {"num": "18", "question": "Explain list slicing with a quick example.", "hinglish": "<code>lst[start:stop:step]</code> — jaise <code>lst[1:5:2]</code> index 1 se 4 tak, har 2nd element.", "english": "<code>lst[start:stop:step]</code> — e.g. <code>lst[1:5:2]</code> takes elements from index 1 to 4, every 2nd element.", "cross": "\"How do you reverse a list using slicing?\" → <code>lst[::-1]</code>", "intent": ""}, {"num": "19", "question": "What's the difference between <code>==</code> and <code>.equals()</code>-style comparison for custom objects?", "hinglish": "Default <code>==</code> identity check karta hai unless <code>__eq__</code> override kiya ho class me.", "english": "By default <code>==</code> falls back to identity comparison unless you override <code>__eq__</code> in the class.", "cross": "\"What method would you override for custom sorting too?\" → <code>__lt__</code> (and related comparison dunder methods).", "intent": ""}, {"num": "20", "question": "What is a context manager (<code>with</code> statement) used for?", "hinglish": "Resources (jaise files) ko properly open/close manage karta hai automatically, even agar exception aaye.", "english": "It manages resource setup/cleanup automatically (e.g. file handles), even if an exception occurs.", "cross": "\"How would you write a custom context manager?\" → Implement <code>__enter__</code> and <code>__exit__</code>, or use <code>@contextlib.contextmanager</code>.", "intent": ""}, {"num": "21", "question": "Difference between <code>__init__</code> and <code>__new__</code>?", "hinglish": "<code>__new__</code> object create karta hai (memory allocate), <code>__init__</code> already-created object ko initialize karta hai.", "english": "<code>__new__</code> creates the object (allocates memory); <code>__init__</code> initializes the already-created object.", "cross": "\"When would you override <code>__new__</code>?\" → For singleton patterns or immutable type subclassing.", "intent": ""}, {"num": "22", "question": "What's the difference between a module and a package?", "hinglish": "Module ek single <code>.py</code> file hai; package ek folder hai modules ka, with <code>__init__.py</code>.", "english": "A module is a single <code>.py</code> file; a package is a folder of modules, containing an <code>__init__.py</code>.", "cross": "\"Is <code>__init__.py</code> mandatory in modern Python?\" → Not strictly since namespace packages were introduced, but still common practice.", "intent": ""}, {"num": "23", "question": "How do you handle a function that needs to return multiple values?", "hinglish": "Tuple return karte hain, jise unpack kar sakte hain: <code>return a, b</code> then <code>x, y = func()</code>.", "english": "Return a tuple, which can be unpacked: <code>return a, b</code> then <code>x, y = func()</code>.", "cross": "\"What if you have many return values — better alternative?\" → Use a <code>dataclass</code> or <code>NamedTuple</code> for clarity.", "intent": ""}, {"num": "24", "question": "What's the difference between <code>append()</code> and <code>extend()</code> on a list?", "hinglish": "<code>append()</code> ek single element add karta hai (even a list as one item); <code>extend()</code> iterable ke elements ko individually add karta hai.", "english": "<code>append()</code> adds a single element (even a list becomes one nested item); <code>extend()</code> adds each element of an iterable individually.", "cross": "\"What does <code>lst + other_list</code> do differently?\" → Creates a new list (concatenation) rather than modifying in place.", "intent": ""}, {"num": "25", "question": "How would you efficiently check membership in a large collection — list vs set?", "hinglish": "Set membership check O(1) hai (hashing ki wajah se); list membership check O(n) hai.", "english": "Set membership check is O(1) due to hashing; list membership check is O(n).", "cross": "\"So why ever use a list if sets are faster for lookup?\" → Lists preserve order and allow duplicates; sets don't.", "intent": ""}], "prose": ""}]}, {"title": "PART 7 — ML Fundamentals (20 Qs)", "subsections": [{"title": "_default", "questions": [{"num": "1", "question": "Difference between regression and classification?", "hinglish": "Regression continuous value predict karta hai (jaise price); classification discrete category predict karta hai (jaise spam/not-spam).", "english": "Regression predicts a continuous value; classification predicts a discrete category.", "cross": "\"Can a regression model be turned into a classifier?\" → Yes — e.g., logistic regression applies a threshold to a continuous output to classify.", "intent": ""}, {"num": "2", "question": "What is overfitting vs underfitting?", "hinglish": "Overfitting = model training data ko bahut achhe se yaad karta hai but naye data pe fail; underfitting = model itna simple hai ki training data bhi achhe se nahi seekh paata.", "english": "Overfitting = model memorizes training data but fails on new data; underfitting = model is too simple to even learn the training data well.", "cross": "\"How do you detect overfitting in practice?\" → Large gap between training accuracy and validation/test accuracy.", "intent": ""}, {"num": "3", "question": "Explain the bias-variance tradeoff.", "hinglish": "High bias = model bahut simple, important patterns miss karta hai; high variance = model bahut sensitive, noise bhi seekh leta hai. Goal balance dhoondhna hai.", "english": "High bias = model too simple, misses real patterns; high variance = model too sensitive, learns noise too. The goal is finding the right balance.", "cross": "\"Which one does adding more training data help with more?\" → High variance — more data helps reduce overfitting.", "intent": ""}, {"num": "4", "question": "What is cross-validation, and why use it over a single train/test split?", "hinglish": "Data ko multiple folds me split karke, har fold ko baari-baari test set banate hain — single split se zyada reliable performance estimate milta hai.", "english": "It splits data into multiple folds and rotates which fold is the test set — gives a more reliable performance estimate than a single split.", "cross": "\"What's k-fold cross-validation specifically?\" → Data split into k parts; train on k-1, test on 1, repeated k times, then average the results.", "intent": ""}, {"num": "5", "question": "Explain precision, recall, and F1-score.", "hinglish": "Precision = jo positive predict kiya usme se kitne sahi the; Recall = actual positives me se kitne pakde gaye; F1 = dono ka harmonic mean.", "english": "Precision = of predicted positives, how many were correct; Recall = of actual positives, how many were caught; F1 = harmonic mean of both.", "cross": "\"When would you prioritize recall over precision?\" → When missing a positive case is costly — e.g. disease detection (your LuminaPath project).", "intent": ""}, {"num": "6", "question": "What's a confusion matrix?", "hinglish": "Ek table jo True Positive, False Positive, True Negative, False Negative dikhata hai — classification performance ka detailed breakdown.", "english": "A table showing True Positive, False Positive, True Negative, False Negative — a detailed breakdown of classification performance.", "cross": "\"How do you compute accuracy from it?\" → (TP+TN) / (TP+TN+FP+FN).", "intent": ""}, {"num": "7", "question": "What's the difference between R² and RMSE — when would you report each?", "hinglish": "R² model ki explained variance batata hai (0-1 scale, comparative); RMSE error ko original unit me batata hai (interpretable magnitude).", "english": "R² shows explained variance on a 0-1 scale (good for comparison); RMSE shows error in the original unit (interpretable magnitude).", "cross": "\"Can R² be negative? What does that mean?\" → Yes — it means the model performs worse than simply predicting the mean.", "intent": ""}, {"num": "8", "question": "What is feature engineering, and give an example from your own work.", "hinglish": "Raw data se naye, useful features banane ka process — jaise TechnoHacks me feature selection se model accuracy improve ki.", "english": "The process of creating new, useful features from raw data — e.g., feature selection in the TechnoHacks project to improve model accuracy.", "cross": "\"What's the difference between feature selection and feature extraction?\" → Selection picks existing relevant features; extraction creates new ones (e.g., PCA components).", "intent": ""}, {"num": "9", "question": "How do you handle missing data — name 3 approaches.", "hinglish": "Drop rows/columns, mean/median/mode imputation, ya model-based imputation (jaise KNN imputer).", "english": "Drop rows/columns, mean/median/mode imputation, or model-based imputation (e.g. KNN imputer).", "cross": "\"When is dropping data a bad idea?\" → When missingness is large or non-random — you lose too much signal or introduce bias.", "intent": ""}, {"num": "10", "question": "How do you handle class imbalance?", "hinglish": "Class weighting, oversampling (SMOTE), undersampling, ya better evaluation metrics (precision/recall instead of accuracy).", "english": "Class weighting, oversampling (SMOTE), undersampling, or using better evaluation metrics like precision/recall instead of accuracy.", "cross": "\"Which did you use in LuminaPath?\" → Tie back to your actual augmentation/class-weighting answer there.", "intent": ""}, {"num": "11", "question": "What's the difference between hyperparameters and model parameters?", "hinglish": "Parameters model training se seekhe jaate hain (jaise weights); hyperparameters humein manually set karne hote hain training se pehle (jaise learning rate).", "english": "Parameters are learned during training (e.g. weights); hyperparameters are set manually before training (e.g. learning rate).", "cross": "\"Name 3 hyperparameters you've tuned.\" → e.g. learning rate, number of layers/filters, batch size (from LuminaPath).", "intent": ""}, {"num": "12", "question": "What's grid search vs random search for hyperparameter tuning?", "hinglish": "Grid search saare combinations exhaustively try karta hai; random search randomly combinations sample karta hai — usually zyada efficient bade search spaces ke liye.", "english": "Grid search exhaustively tries all combinations; random search samples combinations randomly — usually more efficient for large search spaces.", "cross": "\"What's Bayesian optimization, and why might it beat both?\" → It uses past results to intelligently choose the next combination to try, converging faster than blind search.", "intent": ""}, {"num": "13", "question": "Explain the difference between supervised, unsupervised, and reinforcement learning.", "hinglish": "Supervised = labeled data se seekhna; unsupervised = patterns dhoondhna bina labels ke; reinforcement = reward/penalty se trial-and-error seekhna.", "english": "Supervised learns from labeled data; unsupervised finds patterns without labels; reinforcement learns through trial-and-error via rewards/penalties.", "cross": "\"Which type is RAG retrieval closer to?\" → Closer to unsupervised (embedding similarity) — no labeled \"correct chunk\" training involved typically.", "intent": ""}, {"num": "14", "question": "What is regularization, and why does it help?", "hinglish": "Model complexity pe penalty add karta hai (L1/L2) taaki overfitting kam ho.", "english": "It adds a penalty on model complexity (L1/L2) to reduce overfitting.", "cross": "\"Difference between L1 and L2 regularization?\" → L1 can shrink some weights to exactly zero (feature selection effect); L2 shrinks weights smoothly toward zero without eliminating them.", "intent": ""}, {"num": "15", "question": "What's the curse of dimensionality?", "hinglish": "Jab features bahut zyada badh jaate hain, data sparse ho jaata hai high-dimensional space me, jisse models ko patterns seekhna mushkil ho jaata hai.", "english": "As the number of features grows very large, data becomes sparse in high-dimensional space, making it harder for models to learn meaningful patterns.", "cross": "\"How do you address it?\" → Dimensionality reduction (PCA), feature selection, or regularization.", "intent": ""}, {"num": "16", "question": "What's data leakage, and how do you prevent it?", "hinglish": "Jab test/future information accidentally training process me leak ho jaati hai, jisse model performance artificially inflate hota hai — split data carefully before any preprocessing/scaling.", "english": "When test/future information accidentally leaks into the training process, artificially inflating performance — prevent it by splitting data before any preprocessing/scaling.", "cross": "\"Give an example of leakage in a time-series sales prediction (like TechnoHacks).\" → Using future sales data to engineer a feature that predicts current sales.", "intent": ""}, {"num": "17", "question": "What's the difference between parametric and non-parametric models?", "hinglish": "Parametric models fixed number of parameters assume karte hain (jaise linear regression); non-parametric models data ke size ke saath flexibility badhate hain (jaise KNN, decision trees).", "english": "Parametric models assume a fixed number of parameters (e.g. linear regression); non-parametric models grow in flexibility with data size (e.g. KNN, decision trees).", "cross": "\"Which type generalizes better with limited data?\" → Parametric models, typically — fewer assumptions to \"go wrong\" with little data.", "intent": ""}, {"num": "18", "question": "How would you explain a model's predictions to a non-technical stakeholder (e.g. interpretability)?", "hinglish": "Feature importance, simple visualizations, ya SHAP/LIME jaise tools use karke explain karta hoon kis feature ne decision ko sabse zyada influence kiya.", "english": "Using feature importance, simple visualizations, or tools like SHAP/LIME to explain which features most influenced a decision.", "cross": "\"Why does interpretability matter more in healthcare (like LuminaPath)?\" → Clinicians need to trust and verify the reasoning behind a diagnosis, not just accept a black-box output.", "intent": ""}, {"num": "19", "question": "What's the difference between batch learning and online learning?", "hinglish": "Batch learning ek fixed dataset pe ek baar train hota hai; online learning continuously naye data se incrementally update hota hai.", "english": "Batch learning trains once on a fixed dataset; online learning updates incrementally and continuously as new data arrives.", "cross": "\"Which would suit a sales prediction model that gets new data daily?\" → Online or periodic retraining, to keep up with evolving sales trends.", "intent": ""}, {"num": "20", "question": "How do you decide a model is \"good enough\" to ship?", "hinglish": "Business requirement/threshold define karta hoon pehle, fir validation metrics us threshold se compare karta hoon, aur edge cases/failure modes bhi check karta hoon.", "english": "Define a business-requirement threshold upfront, compare validation metrics against it, and also check edge cases/failure modes before shipping.", "cross": "\"What threshold would you set for a medical detection model?\" → Much higher recall bar than a typical business model, given the cost of missing a true positive.", "intent": ""}], "prose": ""}]}, {"title": "PART 8 — Deep Learning (20 Qs)", "subsections": [{"title": "_default", "questions": [{"num": "1", "question": "What is a neural network, at the simplest level?", "hinglish": "Layers of interconnected nodes (neurons) jo weighted inputs lekar, activation function se non-linear transformation karte hain, output predict karne ke liye.", "english": "Layers of interconnected nodes that take weighted inputs and apply a non-linear activation function to produce an output.", "cross": "\"What happens with zero hidden layers?\" → It reduces to a simple linear model (like linear/logistic regression).", "intent": ""}, {"num": "2", "question": "What's an activation function, and why is non-linearity needed?", "hinglish": "Activation function decide karta hai neuron \"fire\" karega ya nahi; non-linearity ke bina network sirf linear transformations stack kar sakta, complex patterns nahi seekh sakta.", "english": "It decides whether/how strongly a neuron \"fires\"; without non-linearity, stacking layers would just be a linear transformation, unable to learn complex patterns.", "cross": "\"Name 3 common activation functions and one downside of each.\" → ReLU (dying ReLU problem), Sigmoid (vanishing gradient), Tanh (still some vanishing gradient, though centered at zero).", "intent": ""}, {"num": "3", "question": "Explain backpropagation simply.", "hinglish": "Output se error calculate karke, chain rule use karke gradients backward layers tak propagate karte hain, taaki weights update ho sake.", "english": "Calculate error at the output, then use the chain rule to propagate gradients backward through layers so weights can be updated.", "cross": "\"What's the vanishing gradient problem related to this?\" → In deep networks, gradients can shrink to near-zero as they propagate backward, stalling learning in early layers.", "intent": ""}, {"num": "4", "question": "What is gradient descent, and what does the learning rate control?", "hinglish": "Ek optimization algorithm jo loss function ko minimize karta hai weights ko gradient ki opposite direction me update karke; learning rate decide karta hai step size kitna bada hai.", "english": "An optimization algorithm that minimizes the loss by updating weights opposite to the gradient direction; the learning rate controls how big each update step is.", "cross": "\"What happens if learning rate is too high or too low?\" → Too high = overshoots/diverges; too low = trains very slowly or gets stuck.", "intent": ""}, {"num": "5", "question": "Difference between batch, mini-batch, and stochastic gradient descent?", "hinglish": "Batch = full dataset pe ek gradient update; stochastic = ek sample pe update; mini-batch = small chunk pe update — practical balance.", "english": "Batch GD updates using the whole dataset per step; SGD updates per single sample; mini-batch updates on small chunks — the practical middle ground.", "cross": "\"Why is mini-batch the most commonly used in practice?\" → Balances training stability with computational efficiency and lets you leverage GPU parallelism.", "intent": ""}, {"num": "6", "question": "What's a CNN, and why is it suited for images (tie to LuminaPath)?", "hinglish": "CNN convolutional filters use karta hai spatial patterns (edges, textures) detect karne ke liye, weight sharing se parameters efficient rehte hain — exactly jo maine LuminaPath me OCT images pe use kiya.", "english": "A CNN uses convolutional filters to detect spatial patterns (edges, textures), with weight sharing keeping parameters efficient — exactly what I used in LuminaPath for OCT images.", "cross": "\"What does a pooling layer do?\" → Downsamples feature maps, reducing dimensionality while retaining important features (e.g. max pooling keeps the strongest activation).", "intent": ""}, {"num": "7", "question": "Explain convolution operation simply.", "hinglish": "Ek small filter/kernel image pe slide karta hai, har position pe element-wise multiply + sum karke ek feature map banata hai.", "english": "A small filter/kernel slides over the image, doing element-wise multiplication and summation at each position to produce a feature map.", "cross": "\"What does filter/kernel size affect?\" → Larger kernels capture broader patterns but cost more compute; smaller kernels capture finer local detail.", "intent": ""}, {"num": "8", "question": "What is transfer learning, and would it have helped LuminaPath?", "hinglish": "Pretrained model (bade dataset pe trained) ko apne smaller dataset pe fine-tune karna — yeh LuminaPath me accuracy aur training time dono improve kar sakta tha.", "english": "Using a model pretrained on a large dataset and fine-tuning it on your smaller dataset — this could have improved both accuracy and training time in LuminaPath.", "cross": "\"What layers would you freeze vs fine-tune?\" → Typically freeze early/generic feature layers, fine-tune later/task-specific layers.", "intent": ""}, {"num": "9", "question": "What's an RNN, and what problem does it solve that CNNs don't?", "hinglish": "RNN sequential data handle karta hai, previous time-step ki information ko \"memory\" ke through current step pe carry karta hai — CNN spatial data ke liye better hai, sequence ke liye nahi.", "english": "An RNN handles sequential data by carrying information from previous time steps forward as \"memory\" — CNNs are better suited for spatial data, not sequences.", "cross": "\"What's RNN's main limitation?\" → Vanishing gradients over long sequences, making it hard to learn long-range dependencies.", "intent": ""}, {"num": "10", "question": "How does LSTM solve RNN's limitation?", "hinglish": "LSTM gates (forget, input, output) use karta hai selectively information ko remember ya forget karne ke liye, jisse long-range dependencies better capture hoti hain.", "english": "LSTM uses gates (forget, input, output) to selectively remember or discard information, capturing long-range dependencies better than plain RNNs.", "cross": "\"What replaced LSTMs in most modern NLP work?\" → Transformers (attention-based), due to better parallelization and long-range modeling.", "intent": ""}, {"num": "11", "question": "Explain the attention mechanism simply.", "hinglish": "Attention model ko decide karne deta hai input ke kis part pe sabse zyada \"focus\" karna hai, output generate karte waqt — weighted combination of all positions.", "english": "Attention lets the model decide which parts of the input to \"focus\" on most when generating output — a weighted combination of all positions.", "cross": "\"How does self-attention differ from regular attention?\" → Self-attention relates positions within the same sequence to each other, rather than between two different sequences.", "intent": ""}, {"num": "12", "question": "What's a Transformer, at a high level — and why does it matter for your RAG project?", "hinglish": "Transformer self-attention use karta hai context understand karne ke liye, sequentially process kiye bina (RNN ke unlike) — yehi architecture OpenAI/Hugging Face models ke peeche hai jo maine Brainwave/CuraLink me use kiye.", "english": "A Transformer uses self-attention to understand context without sequential processing (unlike RNNs) — it's the architecture behind the OpenAI/Hugging Face models I used in Brainwave/CuraLink.", "cross": "\"Why are Transformers better parallelized than RNNs?\" → They process all sequence positions simultaneously via attention, instead of step-by-step like RNNs.", "intent": ""}, {"num": "13", "question": "What's a loss function, and name one for regression and one for classification.", "hinglish": "Loss function batata hai model kitna \"galat\" hai — regression ke liye MSE, classification ke liye Cross-Entropy.", "english": "A loss function measures how \"wrong\" the model's prediction is — MSE for regression, Cross-Entropy for classification.", "cross": "\"Why not use MSE for classification?\" → It doesn't penalize confident wrong predictions as effectively as cross-entropy does for probability outputs.", "intent": ""}, {"num": "14", "question": "Name 2 optimizers and the key difference between them.", "hinglish": "SGD basic gradient steps leta hai; Adam adaptive learning rates + momentum use karta hai, usually faster convergence deta hai.", "english": "SGD takes basic gradient steps; Adam uses adaptive learning rates plus momentum, usually converging faster.", "cross": "\"Which would you default to for a new project?\" → Adam, as a strong general-purpose default.", "intent": ""}, {"num": "15", "question": "What's dropout, and why does it help?", "hinglish": "Training ke time randomly kuch neurons \"off\" kar dete hain — model ko ek single neuron pe over-rely karne se rokta hai, overfitting kam karta hai.", "english": "Randomly \"switches off\" some neurons during training — prevents the model from over-relying on specific neurons, reducing overfitting.", "cross": "\"Is dropout used during inference too?\" → No — it's disabled at inference; all neurons are active for the final prediction.", "intent": ""}, {"num": "16", "question": "What's the difference between an epoch and a batch?", "hinglish": "Epoch = ek baar pura dataset model ke through pass hota hai; batch = ek subset of data jisme weight update hota hai ek baar.", "english": "An epoch is one full pass through the entire dataset; a batch is the subset of data used for a single weight update.", "cross": "\"How do you choose batch size?\" → Balance between memory constraints (GPU/CPU) and training stability/speed.", "intent": ""}, {"num": "17", "question": "What's batch normalization, and why does it help training?", "hinglish": "Layer inputs ko normalize karta hai (mean 0, variance 1) training stability badhane ke liye, aur training ko faster banata hai.", "english": "It normalizes layer inputs (to mean 0, variance 1) to improve training stability and speed up convergence.", "cross": "\"Where is it typically placed in a network?\" → After a layer's linear transformation, before the activation function.", "intent": ""}, {"num": "18", "question": "What's the difference between training, validation, and test sets?", "hinglish": "Training = model seekhta hai; validation = hyperparameters tune karne ke liye use hota hai; test = final unbiased performance check.", "english": "Training is what the model learns from; validation is used for tuning hyperparameters; test gives a final, unbiased performance check.", "cross": "\"Why not tune hyperparameters directly on the test set?\" → It would leak test information into model decisions, giving an overly optimistic, biased performance estimate.", "intent": ""}, {"num": "19", "question": "What's early stopping?", "hinglish": "Training ko stop kar dena jab validation loss improve hona band ho jaaye — overfitting prevent karne ka simple technique.", "english": "Stopping training once validation loss stops improving — a simple technique to prevent overfitting.", "cross": "\"How is this different from just reducing the number of epochs upfront?\" → Early stopping adapts dynamically to the actual training behavior, rather than guessing a fixed epoch count in advance.", "intent": ""}, {"num": "20", "question": "How do you decide on the number of layers/neurons in a network (like in LuminaPath)?", "hinglish": "Start simple architecture se, validation performance dekhna, fir gradually complexity badhana/tune karna jab tak diminishing returns na aaye.", "english": "Start with a simpler architecture, monitor validation performance, then gradually increase complexity/tune until you hit diminishing returns.", "cross": "\"What's a sign your architecture is too complex for your data?\" → Training accuracy is high but validation accuracy is much lower (overfitting).", "intent": ""}], "prose": ""}]}, {"title": "PART 9 — Computer Vision (10 Qs, tied to LuminaPath)", "subsections": [{"title": "Beginner", "questions": [{"num": "1", "question": "What's the difference between image classification, object detection, and segmentation?", "hinglish": "Classification = whole image ko ek label; detection = objects locate + label (bounding boxes); segmentation = pixel-level classification.", "english": "Classification labels the whole image; detection locates and labels objects with bounding boxes; segmentation classifies at the pixel level.", "cross": "\"Which one is LuminaPath doing?\" → Classification (disease category for the whole OCT scan).", "intent": ""}, {"num": "2", "question": "Why do we normalize pixel values before training?", "hinglish": "Normalization (jaise 0-255 ko 0-1 me scale karna) training ko stable aur faster banata hai, gradients ko consistent scale pe rakhta hai.", "english": "Normalizing pixel values (e.g. 0-255 to 0-1) stabilizes and speeds up training by keeping gradients on a consistent scale.", "cross": "\"What other normalization did you apply in LuminaPath?\" → Tie back to your resizing/consistency answer there.", "intent": ""}, {"num": "3", "question": "What is image augmentation, and why does it matter for medical images specifically?", "hinglish": "Existing images ko transform karke (rotate, flip, zoom) artificially dataset size badhana — medical images me especially helpful hai kyunki labeled data limited/expensive hota hai.", "english": "Artificially expanding the dataset by transforming existing images (rotate, flip, zoom) — especially valuable in medical imaging where labeled data is scarce and expensive.", "cross": "\"Are all augmentations safe for medical images?\" → No — e.g. horizontal flips can be medically invalid depending on anatomy; augmentations must be domain-appropriate.", "intent": ""}], "prose": ""}, {"title": "Intermediate", "questions": [{"num": "4", "question": "What's the role of pooling layers in a CNN?", "hinglish": "Spatial dimensions reduce karta hai (downsampling), computation kam karta hai, aur important features ko retain karta hai.", "english": "Reduces spatial dimensions (downsampling), cuts computation, and retains the most important features.", "cross": "\"Max pooling vs average pooling — which would you pick for disease detection and why?\" → Max pooling, since it preserves the strongest/most distinctive activations, often more relevant for detecting disease features.", "intent": ""}, {"num": "5", "question": "How do you address dataset imbalance specifically in medical image classification?", "hinglish": "Class weighting, oversampling minority class images, targeted augmentation, ya focal loss use karna.", "english": "Class weighting, oversampling minority-class images, targeted augmentation, or using focal loss.", "cross": "\"What's focal loss, conceptually?\" → A loss that down-weights easy/majority-class examples, forcing the model to focus more on harder, minority-class examples.", "intent": ""}, {"num": "6", "question": "What evaluation metrics would you prioritize for a disease-detection model, beyond accuracy?", "hinglish": "Recall (sensitivity) especially important — false negatives medical context me bahut costly hain. Precision, F1, AUC-ROC bhi important.", "english": "Recall (sensitivity) is especially critical — false negatives are very costly in a medical context. Precision, F1, and AUC-ROC also matter.", "cross": "\"What's AUC-ROC measuring exactly?\" → The model's ability to distinguish between classes across all classification thresholds, not just one.", "intent": ""}, {"num": "7", "question": "How would you visually verify your CNN is \"looking at\" the right part of the image (not learning shortcuts)?", "hinglish": "Grad-CAM ya saliency maps use kar sakte hain dekhne ke liye model kis pixels/regions pe focus kar raha hai prediction ke time.", "english": "Use Grad-CAM or saliency maps to see which pixels/regions the model is focusing on when making a prediction.", "cross": "\"Did you do this in LuminaPath?\" → Be honest if not — acknowledge it as a good next step for trust/interpretability.", "intent": ""}], "prose": ""}, {"title": "Advanced", "questions": [{"num": "8", "question": "Why might transfer learning from ImageNet not transfer perfectly well to OCT/medical images?", "hinglish": "ImageNet natural images (objects, animals) pe trained hai, jiska visual statistics medical/grayscale OCT images se bahut different hote hain — domain gap ki wajah se fine-tuning zaroori hoti hai.", "english": "ImageNet is trained on natural images (objects, animals) with very different visual statistics from grayscale OCT scans — that domain gap means fine-tuning is essential, not just using frozen features.", "cross": "\"What would you do to bridge that domain gap better?\" → Fine-tune more layers, or use a model pretrained on medical imaging datasets if available.", "intent": ""}, {"num": "9", "question": "How would you detect if your model is relying on a spurious correlation (e.g. image artifacts, scanner watermark) instead of real disease features?", "hinglish": "Grad-CAM se visual check, ya cross-dataset testing (different scanner/source) se confirm karna ki performance consistent rehta hai.", "english": "Visual checks via Grad-CAM, or cross-dataset testing on a different scanner/source to confirm performance holds up — not just the original dataset's quirks.", "cross": "\"Why is this risk higher in small/single-source datasets?\" → Less diversity means the model can latch onto dataset-specific artifacts rather than generalizable disease features.", "intent": ""}, {"num": "10", "question": "If accuracy plateaus at 84% even after more tuning, what would you investigate next?", "hinglish": "Data quality/labeling errors check karna, dataset size/diversity badhana, ya different architecture (transfer learning, ensemble) try karna.", "english": "Check for data quality/labeling errors, increase dataset size/diversity, or try a different architecture (transfer learning, ensembling).", "cross": "\"How would you check for labeling errors specifically?\" → Manually review high-confidence misclassifications — often reveals mislabeled ground truth.", "intent": ""}], "prose": ""}]}, {"title": "PART 10 — RAG + LLM Interview (20 Qs)", "subsections": [{"title": "_default", "questions": [{"num": "1", "question": "What is RAG, and what core problem does it solve for LLMs?", "hinglish": "RAG retrieval ke through relevant external knowledge LLM ko context me deta hai — yeh LLM ke knowledge cutoff aur hallucination problem ko address karta hai bina retraining ke.", "english": "RAG feeds relevant external knowledge to an LLM as context via retrieval — solving the LLM's knowledge cutoff and hallucination problem without retraining.", "cross": "\"Could you achieve the same with a long-context LLM and no retrieval?\" → Possibly for small datasets, but it's expensive/slow at scale, and retrieval is more precise and cost-efficient.", "intent": ""}, {"num": "2", "question": "Why use RAG instead of fine-tuning?", "hinglish": "Fine-tuning expensive aur static hai; RAG knowledge base ko instantly update kar sakte hain without retraining the model.", "english": "Fine-tuning is expensive and static; RAG lets you update the knowledge base instantly without retraining the model.", "cross": "\"Are there cases where you'd want both RAG and fine-tuning?\" → Yes — fine-tuning for style/behavior, RAG for up-to-date factual grounding.", "intent": ""}, {"num": "3", "question": "Explain embeddings and why cosine similarity is commonly used.", "hinglish": "Embeddings text ko vector space me map karte hain meaning ke basis pe; cosine similarity vectors ke angle (direction) compare karta hai, magnitude ignore karke — meaning-focused comparison ke liye useful.", "english": "Embeddings map text into vector space by meaning; cosine similarity compares the angle (direction) between vectors, ignoring magnitude — useful for meaning-focused comparison.", "cross": "\"When would Euclidean distance be preferred instead?\" → When magnitude/scale of the embeddings itself carries meaningful information, not just direction.", "intent": ""}, {"num": "4", "question": "What's chunking, and why does chunk size matter so much?", "hinglish": "Documents ko smaller pieces me todna before embedding — chunk size context completeness aur retrieval precision dono ko affect karta hai.", "english": "Splitting documents into smaller pieces before embedding — chunk size affects both context completeness and retrieval precision.", "cross": "\"What's a smarter alternative to fixed-size chunking?\" → Semantic or structure-aware chunking (e.g. splitting by paragraphs/sections) to preserve meaning boundaries.", "intent": ""}, {"num": "5", "question": "What is a vector database, and why not just use a regular SQL database?", "hinglish": "Vector DB high-dimensional embeddings pe efficient similarity search ke liye optimized hai; SQL DB exact match/structured queries ke liye design hua hai, similarity search ke liye nahi.", "english": "A vector database is optimized for efficient similarity search over high-dimensional embeddings; SQL databases are designed for exact-match/structured queries, not similarity search.", "cross": "\"Can you do vector search inside a regular database now?\" → Yes, many modern databases (e.g. Postgres with pgvector) now support it, blurring the line somewhat.", "intent": ""}, {"num": "6", "question": "What is hallucination in LLMs, and how does RAG reduce (not eliminate) it?", "hinglish": "Hallucination = model confidently galat/fabricated information generate karna; RAG context grounding deta hai jo hallucination risk kam karta hai but completely eliminate nahi karta.", "english": "Hallucination is the model confidently generating false/fabricated information; RAG reduces this risk via context grounding, but doesn't eliminate it entirely.", "cross": "\"Why doesn't RAG fully eliminate hallucination?\" → The LLM can still ignore or misinterpret the provided context and generate something not grounded in it.", "intent": ""}, {"num": "7", "question": "What's prompt engineering, and give a concrete technique you've used.", "hinglish": "Prompts ko design karna taaki LLM se best/most accurate response milte — jaise explicitly instruct karna \"sirf context use karo\" jo maine Brainwave me kiya.", "english": "Designing prompts to get the best/most accurate response from an LLM — e.g. explicitly instructing it to \"only use the provided context,\" which I did in Brainwave.", "cross": "\"What's few-shot prompting?\" → Providing a few examples of the desired input-output pattern in the prompt to guide the model's response.", "intent": ""}, {"num": "8", "question": "What's a context window, and why does it matter for RAG?", "hinglish": "Context window LLM ka maximum input size hai (tokens me) — RAG me yeh limit decide karta hai kitne retrieved chunks fit ho sakte hain ek prompt me.", "english": "The context window is the LLM's maximum input size (in tokens) — in RAG, it determines how many retrieved chunks can fit into a single prompt.", "cross": "\"What happens if your retrieved chunks exceed the context window?\" → You must truncate, prioritize top-k highest-relevance chunks, or summarize before passing to the LLM.", "intent": ""}, {"num": "9", "question": "What's a token, and why do LLMs use tokens instead of raw characters or words?", "hinglish": "Token text ka ek sub-word unit hai — tokens use karna vocabulary size manageable rakhta hai while handling rare/unseen words efficiently (via sub-word splitting).", "english": "A token is a sub-word unit of text — using tokens keeps vocabulary size manageable while still handling rare/unseen words efficiently via sub-word splitting.", "cross": "\"Roughly how many tokens is a word, in English?\" → Roughly 1.3 tokens per word on average, though it varies.", "intent": ""}, {"num": "10", "question": "How would you evaluate retrieval quality quantitatively (not just \"it looks right\")?", "hinglish": "Precision@k, recall@k metrics use karke — ek ground-truth Q&amp;A set banake check karna ki correct chunk retrieve ho raha hai ya nahi.", "english": "Using precision@k/recall@k metrics — build a ground-truth Q&amp;A set and check whether the correct chunk is actually being retrieved.", "cross": "\"Did you do this for Brainwave?\" → Be honest — tie back to your Part 4C answer that this was only qualitative so far.", "intent": ""}, {"num": "11", "question": "What's re-ranking in a RAG pipeline, and why add it?", "hinglish": "Initial retrieval ke baad ek second-stage model use karke retrieved chunks ko relevance ke according re-order karna — initial vector search se zyada precise results milte hain.", "english": "Using a second-stage model to re-order retrieved chunks by relevance after the initial retrieval — gives more precise results than vector search alone.", "cross": "\"Why not just retrieve fewer, more precise chunks from the start instead?\" → Initial retrieval optimizes for recall (don't miss the right chunk); re-ranking then optimizes precision on top of that.", "intent": ""}, {"num": "12", "question": "What's the difference between sparse retrieval (BM25/keyword) and dense retrieval (embeddings)?", "hinglish": "Sparse retrieval exact keyword match pe based hai; dense retrieval semantic meaning capture karta hai embeddings ke through, paraphrasing handle kar sakta hai.", "english": "Sparse retrieval relies on exact keyword matching; dense retrieval captures semantic meaning via embeddings, handling paraphrasing better.", "cross": "\"Why might you combine both (hybrid search)?\" → Sparse catches exact terms (e.g. names/codes) dense might miss; combining gives the best of both worlds.", "intent": ""}, {"num": "13", "question": "What's the difference between an embedding model and the LLM that generates the final answer?", "hinglish": "Embedding model text ko vectors me convert karta hai retrieval ke liye; generation LLM actual natural language answer banata hai retrieved context ke basis pe — yeh do alag models hote hain.", "english": "The embedding model converts text into vectors for retrieval; the generation LLM produces the actual natural-language answer based on retrieved context — these are typically two different models.", "cross": "\"Can you use the same model for both?\" → Some architectures allow it, but typically a dedicated, smaller embedding model is more efficient for retrieval.", "intent": ""}, {"num": "14", "question": "How would you handle multi-turn conversation context in a RAG chatbot (vs single-query Q&amp;A)?", "hinglish": "Conversation history ko bhi context me include karna padta hai, ya query ko reformulate karna pichle turns ke context ke saath before retrieval karne ke.", "english": "You'd need to include conversation history in context, or reformulate the query using prior turns' context before running retrieval.", "cross": "\"Does your current Brainwave setup support multi-turn?\" → Be honest about current single-turn vs. multi-turn capability.", "intent": ""}, {"num": "15", "question": "What's the risk of stale data in a RAG system, and how would you handle document updates?", "hinglish": "Agar source documents update hote hain but vector index purana hai, to outdated information retrieve hoga — re-indexing pipeline ya incremental updates zaroori hain.", "english": "If source documents update but the vector index doesn't, you'll retrieve outdated information — you need a re-indexing pipeline or incremental update strategy.", "cross": "\"How would you do incremental updates without re-embedding everything?\" → Only re-embed and re-index the changed/new documents, not the full corpus.", "intent": ""}, {"num": "16", "question": "What's the difference between zero-shot, few-shot, and chain-of-thought prompting?", "hinglish": "Zero-shot = bina example diye direct task; few-shot = kuch examples deke; chain-of-thought = model ko step-by-step reasoning explicitly karne ko bolna.", "english": "Zero-shot gives the task with no examples; few-shot provides some examples; chain-of-thought explicitly asks the model to reason step-by-step.", "cross": "\"When would chain-of-thought help most?\" → For complex, multi-step reasoning tasks (math, logic), less so for simple factual lookups.", "intent": ""}, {"num": "17", "question": "What's temperature in LLM generation, and what would you set it to for a RAG QA system?", "hinglish": "Temperature output randomness control karta hai; RAG factual QA ke liye low temperature (jaise 0-0.3) better hota hai consistent, grounded answers ke liye.", "english": "Temperature controls output randomness; for RAG factual QA, a low temperature (e.g. 0-0.3) is better for consistent, grounded answers.", "cross": "\"Why not temperature 0 always?\" → Can make responses overly rigid/repetitive in some cases; a small amount of randomness sometimes improves natural phrasing.", "intent": ""}, {"num": "18", "question": "What's the difference between RAG and an \"agent\" that uses tools?", "hinglish": "RAG primarily retrieval + generation pe focused hai; agent multiple tools/actions (search, calculator, API calls) ko decide kar sakta hai use karna based on the task, often in multiple steps.", "english": "RAG is primarily focused on retrieval + generation; an agent can decide to use multiple tools/actions (search, calculator, API calls) across multiple steps based on the task.", "cross": "\"Could CuraLink be considered agent-like?\" → Partially — its multi-API routing/fallback logic has agent-like characteristics, even without a full agentic LLM loop.", "intent": ""}, {"num": "19", "question": "What would you do if retrieval consistently returns documents that are topically related but don't actually answer the question?", "hinglish": "Chunking strategy revisit karna, query reformulation try karna, ya re-ranking add karna taaki sirf relevant nahi balki directly-answering chunks prioritize ho.", "english": "Revisit the chunking strategy, try query reformulation, or add re-ranking to prioritize chunks that directly answer the question, not just topically related ones.", "cross": "\"Is this a retrieval problem or a generation problem?\" → It's specifically a retrieval problem — the generation step can only work with what it's given.", "intent": ""}, {"num": "20", "question": "If AIHIFusion needed a RAG system over fashion/finance documents instead of medical/general text, what would change in your approach?", "hinglish": "Embedding model domain ke according choose karna, chunking ko document structure (jaise financial tables, fashion catalogs) ke according adapt karna — core pipeline (FAISS + LLM) same reh sakta hai.", "english": "Choose an embedding model suited to the domain, adapt chunking to the document structure (e.g. financial tables, fashion catalogs) — the core pipeline (FAISS + LLM) can largely stay the same.", "cross": "\"Would structured data (like financial tables) need a different retrieval approach entirely?\" → Possibly — tables often need structured parsing/extraction before chunking, rather than treating them as plain text.", "intent": ""}], "prose": ""}]}, {"title": "PART 11 — Light Systems Layer (C++/Linux/Git/DSA)", "subsections": [{"title": "_default", "questions": [], "prose": "<p><em>Per your call: light prep only — basics + an honest gap narrative, not deep CUDA/Gerrit/DejaGNU prep. If the systems-role angle turns out to be real, say so honestly and pivot to \"Python-first, ramping fast\" rather than bluffing depth you don't have.</em></p>"}, {"title": "C++ Basics (5 Qs)", "questions": [{"num": "1", "question": "How is C++ different from Python, in your own words?", "hinglish": "C++ statically-typed aur compiled hai, manual memory management ke saath; Python dynamically-typed aur interpreted hai, automatic memory management ke saath — C++ faster but more verbose hai.", "english": "C++ is statically typed and compiled, with manual memory management; Python is dynamically typed and interpreted with automatic memory management — C++ is faster but more verbose.", "cross": "\"Have you written any C++ code?\" → Be honest if minimal/coursework-only — don't overclaim.", "intent": ""}, {"num": "2", "question": "What's a pointer, basically?", "hinglish": "Ek variable jo kisi doosre variable ka memory address store karta hai.", "english": "A variable that stores the memory address of another variable.", "cross": "\"Difference between a pointer and a reference?\" → A pointer can be reassigned/null; a reference is bound permanently to one variable at creation.", "intent": ""}, {"num": "3", "question": "What's a class vs an object?", "hinglish": "Class ek blueprint hai; object class ka actual instance hai.", "english": "A class is a blueprint; an object is an actual instance of that class.", "cross": "\"Is this similar to Python's OOP?\" → Yes — conceptually identical to Python classes/objects, just with stricter typing and manual memory rules in C++.", "intent": ""}, {"num": "4", "question": "What's the STL, and name one container you know.", "hinglish": "Standard Template Library — ready-made data structures jaise vector (dynamic array), map (key-value), stack, queue.", "english": "The Standard Template Library — ready-made data structures like <code>vector</code> (dynamic array), <code>map</code> (key-value), <code>stack</code>, <code>queue</code>.", "cross": "\"How is <code>std::vector</code> similar to a Python list?\" → Both are dynamic, resizable arrays — vector requires a fixed type, list doesn't.", "intent": ""}, {"num": "5", "question": "Honest answer — how would you ramp up on C++ quickly if this role needs it?", "hinglish": "\"Main Python-first developer hoon, but core programming concepts (OOP, data structures, logic) same hain — syntax aur memory management seekhna main fast kar sakta hoon practice se.\"", "english": "\"I'm a Python-first developer, but core programming concepts — OOP, data structures, logic — transfer directly. I'd need to ramp on syntax and manual memory management, which I can do quickly with focused practice.\"", "cross": "\"How long would that take you?\" → Give a realistic, modest timeframe — don't overpromise instant mastery.", "intent": ""}], "prose": ""}, {"title": "Linux Commands (5 Qs)", "questions": [{"num": "6", "question": "How do you find a file by name in Linux?", "hinglish": "<code>find / -name \"filename\"</code> use karte hain.", "english": "<code>find / -name \"filename\"</code>", "cross": "\"How do you search file contents instead?\" → <code>grep -r \"text\" /path</code>", "intent": ""}, {"num": "7", "question": "How do you check running processes and kill one?", "hinglish": "<code>ps aux</code> ya <code>top</code> se dekhte hain, fir <code>kill &lt;PID&gt;</code> se process kill karte hain.", "english": "<code>ps aux</code> or <code>top</code> to view, then <code>kill &lt;PID&gt;</code> to terminate.", "cross": "\"Difference between <code>kill</code> and <code>kill -9</code>?\" → <code>kill</code> sends a graceful termination signal; <code>kill -9</code> force-kills immediately, no cleanup.", "intent": ""}, {"num": "8", "question": "How do you change file permissions/ownership?", "hinglish": "<code>chmod</code> permissions change karta hai (jaise <code>chmod 755 file</code>), <code>chown</code> ownership change karta hai (jaise <code>chown user:group file</code>).", "english": "<code>chmod</code> changes permissions (e.g. <code>chmod 755 file</code>), <code>chown</code> changes ownership (e.g. <code>chown user:group file</code>).", "cross": "\"What does 755 mean?\" → Owner: read/write/execute; group and others: read/execute.", "intent": ""}, {"num": "9", "question": "How do you securely copy a file to a remote server?", "hinglish": "<code>scp file user@host:/path</code> use karte hain.", "english": "<code>scp file user@host:/path</code>", "cross": "\"How do you SSH into a remote server?\" → <code>ssh user@host</code>", "intent": ""}, {"num": "10", "question": "How do you check disk space or current directory?", "hinglish": "Disk space ke liye <code>df -h</code>, current directory ke liye <code>pwd</code>.", "english": "<code>df -h</code> for disk space, <code>pwd</code> for current directory.", "cross": "\"How do you list files including hidden ones?\" → <code>ls -la</code>", "intent": ""}], "prose": ""}, {"title": "Git Commands (5 Qs)", "questions": [{"num": "11", "question": "Basic workflow to commit and push changes?", "hinglish": "<code>git add .</code> → <code>git commit -m \"message\"</code> → <code>git push</code>", "english": "<code>git add .</code> → <code>git commit -m \"message\"</code> → <code>git push</code>", "cross": "\"What's the difference between <code>git add .</code> and <code>git add -A</code>?\" → <code>git add .</code> stages new/modified files in the current directory; <code>git add -A</code> stages all changes repo-wide, including deletions.", "intent": ""}, {"num": "12", "question": "Difference between <code>git merge</code> and <code>git rebase</code>?", "hinglish": "Merge ek new merge commit banata hai history preserve karte hue; rebase commits ko replay karta hai ek linear, cleaner history banane ke liye.", "english": "Merge creates a new merge commit, preserving full history; rebase replays commits to create a cleaner, linear history.", "cross": "\"When would you avoid rebase?\" → On shared/public branches — rebasing rewrites history and can break collaborators' work.", "intent": ""}, {"num": "13", "question": "What does <code>git stash</code> do?", "hinglish": "Uncommitted changes ko temporarily save kar deta hai, taaki aap clean working directory pe switch branches kar sako.", "english": "Temporarily saves uncommitted changes so you can switch branches with a clean working directory.", "cross": "\"How do you bring stashed changes back?\" → <code>git stash pop</code>", "intent": ""}, {"num": "14", "question": "How do you create and switch to a new branch?", "hinglish": "<code>git checkout -b branch-name</code> (ya naya <code>git switch -c branch-name</code>).", "english": "<code>git checkout -b branch-name</code> (or the newer <code>git switch -c branch-name</code>).", "cross": "\"How do you see all branches?\" → <code>git branch -a</code>", "intent": ""}, {"num": "15", "question": "What's the difference between <code>git pull</code> and <code>git fetch</code>?", "hinglish": "Fetch remote changes download karta hai but merge nahi karta; pull fetch + merge dono karta hai.", "english": "Fetch downloads remote changes without merging; pull does fetch + merge together.", "cross": "\"Why might you prefer fetch over pull?\" → To review incoming changes before merging, avoiding surprise conflicts.", "intent": ""}], "prose": ""}, {"title": "DSA Fresher Basics (5 Qs)", "questions": [{"num": "16", "question": "How would you check if a string is a palindrome — approach and complexity?", "hinglish": "Two-pointer approach — start aur end se compare karte hue move karna; complexity O(n).", "english": "Two-pointer approach — compare characters from both ends moving inward; time complexity O(n).", "cross": "\"Can you do it without extra space?\" → Yes — the two-pointer approach is already O(1) extra space.", "intent": ""}, {"num": "17", "question": "How do you find duplicates in an array efficiently?", "hinglish": "HashSet/HashMap use karke — har element check karna already seen hai ya nahi; complexity O(n) time, O(n) space.", "english": "Use a HashSet/HashMap — check if each element has already been seen; O(n) time, O(n) space.", "cross": "\"What's the brute-force complexity instead?\" → O(n²) with nested loops comparing every pair.", "intent": ""}, {"num": "18", "question": "How does binary search work, and what's its complexity?", "hinglish": "Sorted array me middle element check karte hain, fir search space half kar dete hain har step pe; complexity O(log n).", "english": "Check the middle element of a sorted array, then halve the search space each step; time complexity O(log n).", "cross": "\"What's required for binary search to work at all?\" → The array/data must be sorted.", "intent": ""}, {"num": "19", "question": "When would you use a stack vs a queue?", "hinglish": "Stack LIFO hai (jaise undo functionality, recursion); queue FIFO hai (jaise task scheduling, BFS).", "english": "Stack is LIFO (e.g. undo functionality, recursion); queue is FIFO (e.g. task scheduling, BFS).", "cross": "\"Give a real example from your own projects.\" → e.g. processing a queue of API requests in CuraLink.", "intent": ""}, {"num": "20", "question": "What's the difference between BFS and DFS on a tree/graph?", "hinglish": "BFS level-by-level traverse karta hai (queue use karta hai); DFS deep branches first explore karta hai (stack/recursion use karta hai).", "english": "BFS traverses level-by-level (uses a queue); DFS explores deep down one branch first (uses a stack/recursion).", "cross": "\"Which would you use to find the shortest path in an unweighted graph?\" → BFS — it guarantees the shortest path in unweighted graphs.", "intent": ""}], "prose": ""}]}, {"title": "PART 12 — AIHIFusion Mock Interview (3 Rounds)", "subsections": [{"title": "Round 1 — Screening (HR/Recruiter, ~15-20 min)", "questions": [], "prose": "<ol><li>\"Tell me about yourself.\" → Use 60-second version (Part 2).</li><li>\"Why AIHIFusion?\" → \"Aapki team chhoti hai aur real GenAI products bana rahi hai fashion/healthcare/finance ke liye — yeh exactly woh applied AI work hai jo main karna chahta hoon, RAG/LLM projects ke aage.\"</li><li>\"Why should we hire a fresher over an experienced engineer?\" → \"Main already production-style projects bana chuka hoon (RAG pipeline, API integrations, deployment) — fresher hoon but theoretical sirf nahi hoon.\"</li><li>\"Are you open to relocating to Delhi/Gurgaon?\" → Have a direct yes/no/conditions answer ready — don't be vague here.</li><li>\"What's your expected timeline to join, given you graduate in Dec 2026?\" → Be precise and honest about your availability/notice period given your final semester.</li></ol>"}, {"title": "Round 2 — Technical (Engineer/Senior Engineer, ~45-60 min)", "questions": [], "prose": "<ol><li>Deep dive into Brainwave RAG Assistant (use Part 4C answers).</li><li>3-4 Python questions from Part 6 (likely OOP, exceptions, generators).</li><li>2-3 ML/DL fundamentals from Parts 7-8 (likely overfitting, CNN, evaluation metrics).</li><li>Possibly a live coding question — basic DSA from Part 11 (palindrome, duplicates, binary search) or a small Python script (e.g. \"write a function to clean this messy list\").</li><li>\"Walk me through how you'd debug a model that suddenly performs worse in production than in testing.\" → Mention data drift, distribution shift between training and live data, and checking for pipeline/preprocessing mismatches.</li><li>\"If the JD's C++/CUDA stuff comes up directly\" → Use your honest Part 11 #5 answer — don't bluff.</li></ol>"}, {"title": "Round 3 — Hiring Manager (Culture/Ownership, ~30 min)", "questions": [], "prose": "<ol><li>\"Describe a time you disagreed with feedback on your work — what did you do?\" → Have one real, specific story ready (any project/internship).</li><li>\"How do you handle ambiguity — e.g., an unclear requirement?\" → Tie to CuraLink's API-source decisions or chunking strategy experiments where you had to make judgment calls.</li><li>\"Where do you see yourself in 2 years?\" → \"AI/ML engineering me deeper jaana chahta hoon, especially production-grade GenAI systems — exactly jaisa AIHIFusion bana rahi hai.\"</li><li>\"What questions do you have for us?\" → Always have 2-3 ready, e.g.: \"Is this role actually on a GenAI product team, or is there a separate hardware/toolchain team given the JD mentions C++/CUDA/Gerrit?\" (This is a smart, honest question given what you found in your research — shows you actually read the JD carefully.)</li></ol>"}]}, {"title": "PART 13 — 1-Day Revision Sheet (Final)", "subsections": [{"title": "Top Definitions to Have Razor-Sharp", "questions": [], "prose": "<p>RAG · Embeddings · Vector Search · FAISS · Chunking · Hallucination · Overfitting/Underfitting · Bias-Variance · Precision/Recall/F1 · CNN · Backpropagation · Gradient Descent · Activation Function · Transformer/Attention · Dropout · Regularization · GIL · Decorator · Generator vs Iterator · Cross-Validation</p>"}, {"title": "Top 15 Linux Commands", "questions": [], "prose": "<p><code>ls -la</code> · <code>pwd</code> · <code>cd</code> · <code>find</code> · <code>grep -r</code> · <code>chmod</code> · <code>chown</code> · <code>ps aux</code> · <code>top</code> · <code>kill</code> / <code>kill -9</code> · <code>scp</code> · <code>ssh</code> · <code>df -h</code> · <code>du -sh</code> · <code>cat</code> / <code>tail -f</code></p>"}, {"title": "Top 10 Git Commands", "questions": [], "prose": "<p><code>git add .</code> · <code>git commit -m</code> · <code>git push</code> · <code>git pull</code> · <code>git fetch</code> · <code>git merge</code> · <code>git rebase</code> · <code>git branch</code> · <code>git stash</code> / <code>git stash pop</code> · <code>git checkout -b</code></p>"}, {"title": "Top 10 Project Facts to Never Fumble", "questions": [], "prose": "<ol><li>LuminaPath: 36,000+ OCT images, 63% → 84% accuracy, TensorFlow + Flask + Streamlit.</li><li>LuminaPath weakness: no rigorous recall measurement on disease-positive class yet.</li><li>Brainwave: LangChain + FAISS + OpenAI API, full pipeline ownership (ingestion → chunking → embeddings → retrieval → generation).</li><li>Brainwave weakness: retrieval evaluation is qualitative, not yet precision@k/recall@k measured.</li><li>CuraLink: 3 APIs (PubMed, ClinicalTrials.gov, OpenAlex) + Hugging Face + fallback handling for reliability.</li><li>CuraLink stack reasoning: Node/Express/React chosen for single JS ecosystem with the frontend.</li><li>TechnoHacks: R² ~0.90 sales prediction, Flask API cut manual effort ~40%.</li><li>Take It Smart: broader EDA + regression/classification + NLP preprocessing across structured datasets.</li><li>AIHIFusion reality: small (~24-person) Delhi-based GenAI product company — fashion/healthcare/finance, GANs/VAEs/diffusion/transformers.</li><li>JD mismatch: C++/CUDA/Make/Gerrit/DejaGNU language doesn't match a GenAI product startup — likely a templated/reused JD. Be ready to ask about it directly, honestly.</li></ol>"}, {"title": "Your Honest Gap-Bridging Line (memorize this)", "questions": [], "prose": "<p><strong>Hinglish:</strong> \"Main Python-first AI/ML engineer hoon jisne end-to-end RAG aur deep learning systems banaye hain. C++/CUDA jaisi systems-level skills me mera exposure limited hai, but core engineering aur problem-solving fundamentals strong hain — main fast ramp-up kar sakta hoon agar role me yeh zaroori ho.\"</p><p><strong>English:</strong> \"I'm a Python-first AI/ML engineer who's built end-to-end RAG and deep learning systems. My exposure to systems-level skills like C++/CUDA is limited, but my core engineering and problem-solving fundamentals are strong, and I can ramp up quickly if the role genuinely needs it.\"</p>"}]}];
</script>
<script>
(function(){
  const treeEl = document.getElementById('tree');
  const contentEl = document.getElementById('content');
  const breadcrumbEl = document.getElementById('breadcrumbText');
  const searchInput = document.getElementById('searchInput');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');
  const sidebar = document.getElementById('sidebar');
  const scrim = document.getElementById('scrim');
  const menuBtn = document.getElementById('menuBtn');

  let langMode = 'both';
  let activePart = 0;
  let searchTerm = '';

  const STORAGE_KEY = 'aihifusion_prep_progress_v1';
  let passed = {};
  try{ passed = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }catch(e){ passed = {}; }

  function qKey(partIdx, subIdx, qnum){ return partIdx+'_'+subIdx+'_'+qnum; }

  function saveProgress(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(passed)); }catch(e){}
    updateProgressUI();
  }

  function totalQuestions(){
    let t = 0;
    DATA.forEach(p => p.subsections.forEach(s => t += s.questions.length));
    return t;
  }
  const TOTAL_Q = totalQuestions();

  function passedCount(){
    return Object.values(passed).filter(Boolean).length;
  }

  function updateProgressUI(){
    const c = passedCount();
    progressText.textContent = c + ' / ' + TOTAL_Q + ' passed';
    progressFill.style.width = (TOTAL_Q ? (c/TOTAL_Q*100) : 0) + '%';
    renderTree();
  }

  function partPassedCount(pIdx){
    let c = 0;
    DATA[pIdx].subsections.forEach((s, sIdx) => {
      s.questions.forEach(q => { if(passed[qKey(pIdx,sIdx,q.num)]) c++; });
    });
    return c;
  }
  function partTotalCount(pIdx){
    let c = 0;
    DATA[pIdx].subsections.forEach(s => c += s.questions.length);
    return c;
  }

  function shortTitle(t){
    return t.replace(/^PART \d+\s*—\s*/, '');
  }

  function renderTree(){
    treeEl.innerHTML = '';
    DATA.forEach((p, idx) => {
      const total = partTotalCount(idx);
      const done = partPassedCount(idx);
      const item = document.createElement('div');
      item.className = 'tree-item' + (idx===activePart ? ' active' : '') + (total>0 && done===total ? ' done' : '');
      const numMatch = p.title.match(/PART (\d+)/);
      const num = numMatch ? numMatch[1].padStart(2,'0') : (idx+1+'').padStart(2,'0');
      item.innerHTML = '<span class="idx">' + num + '</span>' +
        '<span class="name">' + shortTitle(p.title) + '</span>' +
        (total>0 ? '<span class="count">' + done + '/' + total + '</span>' : '');
      item.addEventListener('click', () => { activePart = idx; closeSidebarMobile(); render(); });
      treeEl.appendChild(item);
    });
  }

  function matchesSearch(q){
    if(!searchTerm) return true;
    const hay = (q.question+' '+q.hinglish+' '+q.english+' '+q.cross+' '+q.intent).toLowerCase();
    return hay.indexOf(searchTerm) !== -1;
  }

  function render(){
    const part = DATA[activePart];
    breadcrumbEl.textContent = 'aihifusion/' + String(activePart+1).padStart(2,'0') + '_' + shortTitle(part.title).toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,28) + '.md';

    let html = '<div class="part-header">' +
      '<div class="part-eyebrow">Part ' + (activePart+1) + ' / ' + DATA.length + '</div>' +
      '<h1 class="part-title">' + shortTitle(part.title) + '</h1></div>';

    let anyVisible = false;

    part.subsections.forEach((s, sIdx) => {
      const visibleQs = s.questions.filter(matchesSearch);
      const hasProse = s.prose && s.prose.trim().length > 0 && !searchTerm;
      if(visibleQs.length === 0 && !hasProse) return;
      anyVisible = true;

      if(s.title !== '_default'){
        html += '<div class="sub-title">// ' + s.title + '</div>';
      }
      if(hasProse){
        html += '<div class="prose">' + s.prose + '</div>';
      }
      visibleQs.forEach(q => {
        const key = qKey(activePart, sIdx, q.num);
        const isPassed = !!passed[key];
        html += renderCard(q, key, isPassed);
      });
    });

    if(!anyVisible){
      html += '<div class="empty-state">$ no results found for "' + escapeHtml(searchTerm) + '"<br>try another keyword</div>';
    }

    contentEl.innerHTML = html;
    attachCardHandlers();
    renderTree();
  }

  function escapeHtml(s){
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function renderCard(q, key, isPassed){
    let body = '';
    if(q.hinglish){
      body += '<div class="ans-block lang-hi"><span class="ans-tag hi">हिंग्लिश</span><div class="ans-text">' + q.hinglish + '</div></div>';
    }
    if(q.english){
      body += '<div class="ans-block lang-en"><span class="ans-tag en">ENGLISH</span><div class="ans-text">' + q.english + '</div></div>';
    }
    if(q.cross){
      body += '<div class="cross-block lang-en"><span class="cross-label">↳ CROSS-QUESTION</span>' + q.cross + '</div>';
    }
    if(q.intent){
      body += '<div class="intent-block"><b>Interviewer intent:</b> ' + q.intent + '</div>';
    }
    return '<div class="qcard' + (isPassed?' passed':'') + '" data-key="' + key + '">' +
      '<div class="qhead">' +
        '<span class="qcheck">✓</span>' +
        '<span class="qnum">Q' + String(q.num).padStart(2,'0') + '</span>' +
        '<span class="qtext">' + q.question + '</span>' +
        '<span class="qchevron">▸</span>' +
      '</div>' +
      '<div class="qbody">' + body + '</div>' +
    '</div>';
  }

  function attachCardHandlers(){
    document.querySelectorAll('.qcard').forEach(card => {
      const head = card.querySelector('.qhead');
      const check = card.querySelector('.qcheck');
      head.addEventListener('click', (e) => {
        if(e.target === check){
          const key = card.getAttribute('data-key');
          passed[key] = !passed[key];
          card.classList.toggle('passed');
          saveProgress();
          return;
        }
        card.classList.toggle('open');
      });
    });
    applyLangMode();
  }

  function applyLangMode(){
    document.querySelectorAll('.lang-hi').forEach(el => {
      el.classList.toggle('lang-hidden', langMode === 'english');
    });
    document.querySelectorAll('.lang-en').forEach(el => {
      el.classList.toggle('lang-hidden', langMode === 'hinglish');
    });
  }

  document.getElementById('langToggle').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if(!btn) return;
    langMode = btn.getAttribute('data-lang');
    document.querySelectorAll('#langToggle button').forEach(b => b.classList.toggle('active', b===btn));
    applyLangMode();
  });

  let searchTimer;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchTerm = e.target.value.trim().toLowerCase();
      render();
    }, 120);
  });

  function closeSidebarMobile(){
    sidebar.classList.remove('open');
    scrim.classList.remove('show');
  }
  menuBtn.addEventListener('click', () => {
    sidebar.classList.add('open');
    scrim.classList.add('show');
  });
  scrim.addEventListener('click', closeSidebarMobile);

  updateProgressUI();
  render();
})();
</script>
</body>
</html>
